---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/volsync.backube/replicationsource_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: ${APP}
spec:
  sourcePVC: ${APP}
  # Set VOLSYNC_PAUSED=true in an app's ks.yaml postBuild to disable its backups
  # (keeps the PVC, stops the ReplicationSource). Defaults to enabled.
  paused: ${VOLSYNC_PAUSED:=false}
  trigger:
    schedule: ${VOLSYNC_SCHEDULE:=0 * * * *}
  kopia:
    accessModes:
      - ${VOLSYNC_SNAP_ACCESSMODES:=ReadWriteOnce} # Use ReadOnlyMany for CephFS
    cacheAccessModes:
      - ${VOLSYNC_CACHE_ACCESSMODES:=ReadWriteOnce}
    cacheCapacity: ${VOLSYNC_CACHE_CAPACITY:=5Gi}
    # ceph-block (not openebs-hostpath): after the 6-OSD migration the CP Samsungs are
    # Ceph OSDs, so openebs-hostpath falls back to the small boot SATADOM (/var on sda4)
    # and VolSync caches were filling it (CephNodeDiskspaceWarning). Caches live on Ceph now.
    cacheStorageClassName: ${VOLSYNC_CACHE_STORAGECLASS:=ceph-block}
    compression: zstd-fastest
    copyMethod: Snapshot
    moverSecurityContext:
      runAsUser: ${VOLSYNC_PUID:=1000}
      runAsGroup: ${VOLSYNC_PGID:=1000}
      fsGroup: ${VOLSYNC_PGID:=1000}
    moverVolumes:
      - mountPath: repository
        volumeSource:
          nfs:
            path: /volume1/data/kopia
            server: nas02.in.homeops.ca
    parallelism: 1
    repository: ${APP}-volsync-secret
    retain:
      hourly: 24
      daily: 7
    storageClassName: ${VOLSYNC_STORAGECLASS:=ceph-block}
    volumeSnapshotClassName: ${VOLSYNC_SNAPSHOTCLASS:=csi-ceph-blockpool}
