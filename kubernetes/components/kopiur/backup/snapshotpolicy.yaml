---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: ${APP}
  annotations:
    kopiur.home-operations.com/allow-identity-change: "true"
spec:
  # Clone (not Snapshot) sidesteps the rook-1.20.1 CSI-VolumeSnapshot RBD read-only
  # fencing cascade documented in docs/BACKUP-TIERS.md ("copyMethod: Snapshot -> Clone").
  copyMethod: ${KOPIUR_COPYMETHOD:=Clone}
  repository:
    kind: ClusterRepository
    name: nas
  retention:
    keepDaily: ${KOPIUR_KEEP_DAILY:=7}
    keepHourly: ${KOPIUR_KEEP_HOURLY:=24}
  sources:
    - pvc:
        name: ${APP}
  verification:
    deep:
      schedule:
        cron: H 5 1 * *
    quick:
      schedule:
        cron: H 3 * * *
  volumeSnapshotClassName: ${KOPIUR_SNAPSHOTCLASS:=csi-ceph-blockpool}
