---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotschedule_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: ${APP}
spec:
  policyRef:
    name: ${APP}
  schedule:
    # Preserve the staggered per-app schedule from docs/BACKUP-TIERS.md. Paused apps
    # (no data yet / redo-able) set KOPIUR_SUSPEND=true to own the PVC without backing up.
    cron: ${KOPIUR_SCHEDULE:=0 4 * * *}
    suspend: ${KOPIUR_SUSPEND:=false} # yayamlls-disable-line
