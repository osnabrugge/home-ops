---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app printstash
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      printstash:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          frontend:
            image:
              repository: ghcr.io/xiao-villamor/printstash-frontend
              tag: "v0.10.0"
            env:
              TZ: America/Toronto
              NGINX_CLIENT_MAX_BODY_SIZE: 512m
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  periodSeconds: 30
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  periodSeconds: 30
                  failureThreshold: 5
              startup:
                enabled: false
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                add: ["CHOWN", "SETUID", "SETGID"]
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
          api:
            image:
              repository: ghcr.io/xiao-villamor/printstash-api
              tag: "v0.10.0"
            command:
              - /bin/sh
              - -c
              - >
                mkdir -p /data/db /data/files /data/thumbs /data/staging /data/backups &&
                uv run alembic upgrade head &&
                uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --no-access-log --proxy-headers
            env:
              TZ: America/Toronto
              UV_CACHE_DIR: /uv-cache
              VAULT_STORAGE_BACKEND: local
              VAULT_DATA_DIR: /data/files
              VAULT_THUMB_DIR: /data/thumbs
              VAULT_STAGING_DIR: /data/staging
              VAULT_BACKUP_DIR: /data/backups
              VAULT_DB_URL: sqlite:////data/db/printstash.sqlite
              VAULT_MAX_UPLOAD_MB: "512"
              VAULT_JWT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: printstash-secret
                    key: password
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: 8000
                  periodSeconds: 30
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: 8000
                  periodSeconds: 30
                  failureThreshold: 5
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: 8000
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      hostAliases:
        - ip: 127.0.0.1
          hostnames:
            - api
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: *app
        ports:
          http:
            port: 3000
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.homeops.ca"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      uv-cache:
        type: emptyDir
        advancedMounts:
          printstash:
            api:
              - path: /uv-cache
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 20Gi
        storageClass: ceph-block
        advancedMounts:
          printstash:
            api:
              - path: /data
