---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pgcode
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      pgcode:
        annotations:
          reloader.stakater.com/auto: "true"
        # PrettyGCode (Kragrathea/pgcode) ships no container image — it's a static
        # WebGL G-code viewer. The init container clones the repo into the web root
        # at startup; nginx serves it. Connect it to a printer by opening:
        #   https://pgcode.homeops.ca/?server=https://fdm01.homeops.ca
        initContainers:
          fetch:
            image:
              repository: docker.io/alpine/git
              tag: latest
            command:
              - /bin/sh
              - -c
              - >
                rm -rf /usr/share/nginx/html/* &&
                git clone --depth 1 https://github.com/Kragrathea/pgcode.git /usr/share/nginx/html &&
                cp /usr/share/nginx/html/pgcode.html /usr/share/nginx/html/index.html
        containers:
          app:
            image:
              repository: docker.io/library/nginx
              tag: 1.31-alpine
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                add: ["NET_BIND_SERVICE", "CHOWN", "SETUID", "SETGID"]
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                memory: 64Mi
    defaultPodOptions:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
    service:
      app:
        controller: *app
        ports:
          http:
            port: 80
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.homeops.ca"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      web:
        type: emptyDir
        globalMounts:
          - path: /usr/share/nginx/html
