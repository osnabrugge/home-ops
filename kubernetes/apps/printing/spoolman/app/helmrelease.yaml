---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app spoolman
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      spoolman:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/donkie/spoolman
              tag: 0.25.0@sha256:1c4818a467d42946c3f24850aa45686ab67c06cb80e798470b46a33c2c218381
            env:
              TZ: America/Toronto
              SPOOLMAN_HOST: "0.0.0.0"
              SPOOLMAN_PORT: &port 8000
              SPOOLMAN_DIR_DATA: /data
              SPOOLMAN_METRICS_ENABLED: true
              # Use the cluster's HA PostgreSQL (CNPG postgres16) instead of the
              # default SQLite-on-Ceph-RBD DB, which hit "database is locked" write
              # failures under RBD fsync latency + Spoolman's daily backup and
              # silently broke usage tracking (2026-07-07). Postgres removes the
              # single-file writer-lock contention. /data PVC is retained for uploads.
              SPOOLMAN_DB_TYPE: postgres
              SPOOLMAN_DB_HOST: postgres16-rw.database.svc.cluster.local
              SPOOLMAN_DB_PORT: "5432"
              SPOOLMAN_DB_NAME: spoolman
              SPOOLMAN_DB_USERNAME: spoolman
            envFrom:
              - secretRef:
                  name: spoolman-secret
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"], add: ["CHOWN", "SETUID", "SETGID", "FOWNER"]}
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    serviceMonitor:
      app:
        endpoints:
          - port: http
            path: /metrics
            interval: 60s
            scrapeTimeout: 30s
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.homeops.ca"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /data
