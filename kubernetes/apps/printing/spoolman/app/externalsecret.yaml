---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# Spoolman app secret — supplies the PostgreSQL password to the container.
# AKV key: spoolman -> SPOOLMAN_DB_PASSWORD.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: spoolman-secret
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: azurekv
  target:
    name: spoolman-secret
    template:
      data:
        SPOOLMAN_DB_PASSWORD: "{{ .SPOOLMAN_DB_PASSWORD }}"
  dataFrom:
    - extract:
        key: spoolman
