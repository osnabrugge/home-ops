---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: spoolman
spec:
  components:
    - ../../../../components/volsync
    - ../../../../components/zeroscaler
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/printing/spoolman/app
  patches:
    # One-time data migration: spoolman moved from the `default` namespace to
    # `printing`. VolSync's Kopia restore identity defaults to the destination's
    # own namespace, so without this it would restore nothing and the filament
    # inventory would be lost. Point the first restore at the `default` backup.
    # Safe to leave in place: the ReplicationDestination trigger is restore-once.
    - target:
        kind: ReplicationDestination
        name: spoolman-dst
      patch: |
        - op: add
          path: /spec/kopia/sourceIdentity/sourceNamespace
          value: default
  postBuild:
    substitute:
      APP: spoolman
      VOLSYNC_SCHEDULE: "15 3 * * *"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: printing
  wait: false
