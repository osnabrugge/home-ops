---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: netbox-operator
spec:
  # Operator must exist before the NetBox app so CRDs are registered;
  # wait: false because the operator will error until NetBox is running.
  # Once NetBox reconciles, the operator will become healthy automatically.
  dependsOn:
    - name: cloudnative-pg-cluster
      namespace: database
    - name: dragonfly-cluster
      namespace: database
    - name: azurekv
      namespace: external-secrets
  interval: 1h
  path: ./kubernetes/apps/observability/netbox-operator/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: false
