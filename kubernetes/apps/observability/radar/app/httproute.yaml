---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: radar
spec:
  # INTERNAL ONLY. Radar's MCP server runs with no auth (every caller shares the
  # pod ServiceAccount's read view), so it must never be placed on envoy-external.
  hostnames:
    - radar.homeops.ca
  parentRefs:
    - name: envoy-internal
      namespace: network
  rules:
    - backendRefs:
        - name: radar
          port: 9280
