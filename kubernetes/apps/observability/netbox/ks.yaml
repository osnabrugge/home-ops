---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: netbox
spec:
  components:
    - ../../../../components/volsync
    - ../../../../components/zeroscaler
  dependsOn:
    - name: cloudnative-pg-cluster
      namespace: database
    - name: dragonfly-cluster
      namespace: database
    - name: netbox-operator
  interval: 1h
  path: ./kubernetes/apps/observability/netbox/app
  patches:
    # Backups OFF (no data yet). Keeps the PVC, pauses the RS.
    - target:
        kind: ReplicationSource
      patch: |-
        - op: add
          path: /spec/paused
          value: true
  postBuild:
    substitute:
      APP: netbox
      VOLSYNC_SCHEDULE: "24 * * * *"
      VOLSYNC_CAPACITY: 10Gi
      VOLSYNC_CACHE_CAPACITY: 10Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: true
