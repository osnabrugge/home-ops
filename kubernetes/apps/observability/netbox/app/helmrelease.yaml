---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbox
spec:
  chartRef:
    kind: OCIRepository
    name: netbox
  interval: 1h
  values:
    updateStrategy:
      type: Recreate
    worker:
      updateStrategy:
        type: Recreate
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - netbox
                  - key: app.kubernetes.io/component
                    operator: NotIn
                    values:
                      - worker
              topologyKey: kubernetes.io/hostname
    allowedHosts:
      - netbox.homeops.ca
      - netbox.observability.svc.cluster.local
    timeZone: America/Toronto
    # Authenticate NetBox against LLDAP. Uses direct-bind (userDnTemplate), so no
    # bind service account or stored bind password is required: django-auth-ldap
    # binds as the authenticating user, and LLDAP permits that user to read the
    # group tree for the group->permission mapping below. The local superuser from
    # netbox-secret remains a break-glass login.
    #
    # NOTE: the LLDAP `admins` group currently contains BOTH sean-admin and sean,
    # so both will receive NetBox superuser until sean is removed from `admins`.
    remoteAuth:
      enabled: true
      backends:
        - netbox.authentication.LDAPBackend
      ldap:
        serverUri: ldap://lldap.auth.svc.cluster.local:3890
        startTls: false
        userDnTemplate: "uid=%(user)s,ou=people,dc=homeops,dc=ca"
        # Authentication uses userDnTemplate above (bind as the user). LLDAP
        # forbids anonymous search, so a read-only service account is required
        # ONLY for the group search that drives the superuser/staff mapping.
        # Create an LLDAP user `netbox` (read-only) and store its password in the
        # AKV `netbox` secret as NETBOX_LDAP_BIND_PASSWORD (see externalsecret).
        bindDn: "uid=netbox,ou=people,dc=homeops,dc=ca"
        groupSearchBaseDn: "ou=groups,dc=homeops,dc=ca"
        groupSearchClass: groupOfNames
        groupType: GroupOfNamesType
        requireGroupDn: []
        isAdminDn:
          - "cn=admins,ou=groups,dc=homeops,dc=ca"
        isSuperUserDn:
          - "cn=admins,ou=groups,dc=homeops,dc=ca"
        findGroupPerms: true
        mirrorGroups: true
        attrFirstName: givenName
        attrLastName: sn
        attrMail: mail
    existingSecret: netbox-secret
    superuser:
      existingSecret: netbox-secret
    postgresql:
      enabled: false
    externalDatabase:
      host: postgres16-rw.database.svc.cluster.local
      port: 5432
      database: netbox
      username: netbox
      existingSecretName: netbox-secret
      existingSecretKey: postgresql-password
      options:
        sslmode: disable
        target_session_attrs: read-write
    valkey:
      enabled: false
    tasksDatabase:
      host: dragonfly-netbox.database.svc.cluster.local
      port: 6379
      database: 0
      existingSecretName: netbox-secret
      existingSecretKey: tasks-password
    cachingDatabase:
      host: dragonfly-netbox.database.svc.cluster.local
      port: 6379
      database: 1
      existingSecretName: netbox-secret
      existingSecretKey: cache-password
    persistence:
      enabled: true
      existingClaim: netbox
    httpRoute:
      enabled: true
      hostnames:
        - netbox.homeops.ca
      parentRefs:
        - name: envoy-internal
          namespace: network
    ingress:
      enabled: false
