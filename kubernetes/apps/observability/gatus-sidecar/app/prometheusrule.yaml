---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gatus-sidecar-rules
spec:
  groups:
    - name: gatus.rules
      rules:
        - alert: GatusEndpointDown
          expr: |-
            gatus_results_endpoint_success{group=~"external|services"} == 0
          for: 5m
          annotations:
            summary: >-
              The {{ $labels.name }} endpoint is down
          labels:
            severity: critical

        # Fires when an endpoint served ONLY via the internal gateway is unreachable
        # from in-cluster (its backend is down). NOTE: previously named
        # "GatusEndpointExposed" with a misleading "public DNS record / exposed" summary —
        # the expr only ever detected an internal endpoint being DOWN, not exposure.
        - alert: GatusInternalEndpointDown
          expr: |-
            gatus_results_endpoint_success{group="internal"} == 0
          for: 5m
          annotations:
            summary: >-
              The {{ $labels.name }} internal endpoint is unreachable (backend down)
          labels:
            severity: warning
