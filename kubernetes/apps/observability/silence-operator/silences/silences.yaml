---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: ceph-node-nfsmount-diskspace-warning
spec:
  matchers:
    - name: alertname
      value: CephNodeDiskspaceWarning
    - name: mountpoint
      value: /etc/nfsmount.conf
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: ceph-node-local-diskspace-warning
spec:
  matchers:
    - name: alertname
      value: CephNodeDiskspaceWarning
    - name: device
      value: /dev/sd.*
      matchType: "=~"
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: ceph-node-network-packet-drops
spec:
  # Scoped to pve01 only: its packet "drops" are on Proxmox virtual/bridge interfaces
  # (vmbr*, tap*, enwan0 bridged WAN) = VM-destined frames counted as host rx_dropped,
  # not real loss (0 fifo/ring-overflow), and pve01 is not a Ceph OSD node. Real drops on
  # the k8s Ceph nodes' bond0 are NOT silenced and will still alert.
  matchers:
    - name: alertname
      value: CephNodeNetworkPacketDrops
    - name: instance
      value: pve01.in.homeops.ca:9100
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: hpa-maxed-out
spec:
  matchers:
    - name: alertname
      value: KubeHpaMaxedOut
---
# UPS batteries genuinely flag replacement (upsAdvBatteryReplaceIndicator==2),
# but replacement is deferred (hardware/budget). Silence the page until then so
# it stops spamming Pushover; the alert remains defined and will resume if removed.
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: ups-replace-battery
spec:
  matchers:
    - name: alertname
      value: UPSReplaceBattery
# NOTE: the former `nas02-phantom-bond2` silence was removed — nas02's unused bond2
# is now dropped at scrape time via metricRelabelings in the node-exporter ScrapeConfig
# (kube-prometheus-stack/app/scrapeconfig.yaml), so the bonding rules no longer fire.
