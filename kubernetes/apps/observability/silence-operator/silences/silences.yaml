---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: ceph-node-nfsmount-diskspace-warning
spec:
  matchers:
    - name: alertname
      value: CephNodeDiskspaceWarning
    - name: mountpoint
      value: /etc/nfsmount.conf
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: ceph-node-local-diskspace-warning
spec:
  matchers:
    - name: alertname
      value: CephNodeDiskspaceWarning
    - name: device
      value: /dev/sd.*
      matchType: "=~"
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: ceph-node-network-packet-drops
spec:
  matchers:
    - name: alertname
      value: CephNodeNetworkPacketDrops
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: nas-memory-high-utilization
spec:
  matchers:
    - name: alertname
      value: NodeMemoryHighUtilization
    - name: instance
      value: nas02.in.homeops.ca:9100
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: hpa-maxed-out
spec:
  matchers:
    - name: alertname
      value: KubeHpaMaxedOut
---
# UPS batteries genuinely flag replacement (upsAdvBatteryReplaceIndicator==2),
# but replacement is deferred (hardware/budget). Silence the page until then so
# it stops spamming Pushover; the alert remains defined and will resume if removed.
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: ups-replace-battery
spec:
  matchers:
    - name: alertname
      value: UPSReplaceBattery
---
# nas02 (Synology, being retired) has a phantom `bond2` with 0 active members
# (an unused leftover; its real bond0/bond1 are up per the core switch). Both
# NodeBondingDegraded and CephNodeNetworkBondDegraded carry master=bond2, so
# this one matcher silences both. Remove when nas02 is decommissioned.
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: nas02-phantom-bond2
spec:
  matchers:
    - name: master
      value: bond2
