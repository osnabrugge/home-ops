---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app smartctl-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: smartctl-exporter
  interval: 1h
  values:
    fullnameOverride: *app
    # PodSecurityPolicy was removed in Kubernetes 1.25. The chart otherwise
    # creates a RoleBinding to a non-existent "unrestricted-psp" ClusterRole.
    rbac:
      podSecurityPolicy: ""
    serviceMonitor:
      enabled: true
    prometheusRules:
      enabled: false
