---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-diode
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: azurekv
  target:
    name: netbox-diode-secret
    template:
      data:
        # Diode ingester/reconciler credentials (OAuth2 client for ingest)
        DIODE_INGEST_CLIENT_ID: "{{ .DIODE_INGEST_CLIENT_ID }}"
        DIODE_INGEST_CLIENT_SECRET: "{{ .DIODE_INGEST_CLIENT_SECRET }}"
        # Diode-to-NetBox OAuth2 client credentials
        DIODE_TO_NETBOX_CLIENT_ID: "{{ .DIODE_TO_NETBOX_CLIENT_ID }}"
        DIODE_TO_NETBOX_CLIENT_SECRET: "{{ .DIODE_TO_NETBOX_CLIENT_SECRET }}"
        # NetBox-to-Diode OAuth2 client credentials
        NETBOX_TO_DIODE_CLIENT_ID: "{{ .NETBOX_TO_DIODE_CLIENT_ID }}"
        NETBOX_TO_DIODE_CLIENT_SECRET: "{{ .NETBOX_TO_DIODE_CLIENT_SECRET }}"
        # Hydra OAuth2 server system secret (>=32 chars)
        HYDRA_SECRETS_SYSTEM: "{{ .HYDRA_SECRETS_SYSTEM }}"
        # Hydra DSN — postgres connection string for Hydra's own database
        HYDRA_DSN: "postgres://{{ .HYDRA_DB_USERNAME }}:{{ .HYDRA_DB_PASSWORD }}@postgres16-rw.database.svc.cluster.local:5432/hydra?sslmode=disable"
        # Redis password for Diode streams
        REDIS_PASSWORD: "{{ .DIODE_REDIS_PASSWORD }}"
        # Reconciler PostgreSQL credentials
        POSTGRES_USER: "{{ .DIODE_DB_USERNAME }}"
        POSTGRES_PASSWORD: "{{ .DIODE_DB_PASSWORD }}"
        # Hydra PostgreSQL credentials
        HYDRA_POSTGRES_USER: "{{ .HYDRA_DB_USERNAME }}"
        HYDRA_POSTGRES_PASSWORD: "{{ .HYDRA_DB_PASSWORD }}"
  dataFrom:
    - extract:
        key: netbox-diode
