---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-diode
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: azurekv
  target:
    name: netbox-diode-secret
    template:
      data:
        # API key used by Diode to authenticate with NetBox
        DIODE_NETBOX_API_KEY: "{{ .NETBOX_SUPERUSER_API_TOKEN }}"
        # API key used by Diode gRPC clients to authenticate with Diode server
        DIODE_API_KEY: "{{ .NETBOX_DIODE_API_KEY }}"
  dataFrom:
    - extract:
        key: netbox
