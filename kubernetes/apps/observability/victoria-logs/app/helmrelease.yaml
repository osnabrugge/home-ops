---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app victoria-logs
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    fullnameOverride: *app
    global:
      image:
        registry: quay.io
    server:
      fullnameOverride: *app
      # Native syslog ingestion (replaces the standalone fluent-bit
      # "syslog-receiver" forwarder). Listens on a high port so the
      # non-root container does not need CAP_NET_BIND_SERVICE; the
      # victoria-logs-syslog LoadBalancer maps :514 -> :5140.
      extraArgs:
        syslog.listenAddr.tcp: ":5140"
        syslog.listenAddr.udp: ":5140"
      persistentVolume:
        enabled: true
        storageClassName: ceph-block
        size: 50Gi
      retentionPeriod: 90d
      route:
        enabled: true
        hostnames:
          - vlogs.homeops.ca
        parentRefs:
          - name: envoy-internal
            namespace: network
      serviceMonitor:
        enabled: true
    dashboards:
      enabled: true
      grafanaOperator:
        enabled: true
        spec:
          folderRef: *app