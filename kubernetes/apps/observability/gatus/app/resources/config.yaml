---
connectivity:
  checker:
    target: 1.1.1.1:53
    interval: 1m

endpoints:
  - name: Cloudflare
    group: connectivity
    url: icmp://1.1.1.1
    interval: 1m
    conditions:
      - "[CONNECTED] == true"

  - name: Google
    group: connectivity
    url: icmp://8.8.8.8
    interval: 1m
    conditions:
      - "[CONNECTED] == true"

  - name: Quad9
    group: connectivity
    url: icmp://9.9.9.9
    interval: 1m
    conditions:
      - "[CONNECTED] == true"

  # Direct-IP TCP check for qBittorrent BitTorrent port.
  # Uses the LoadBalancer IP (not the hostname) to avoid DNS round-robin
  # issues where qbittorrent.homeops.ca could resolve to envoy-internal
  # (192.168.69.121) instead of the torrent LB (192.168.69.123).
  # A failure here means the firewall port-forward for inbound peers is broken.
  - name: qBittorrent BitTorrent Port
    group: services
    url: tcp://192.168.69.123:31288
    interval: 5m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: pushover

metrics: true

storage:
  type: sqlite
  caching: true
  path: ${GATUS_CONFIG_PATH}/gatus.db

ui:
  title: Status | Gatus
  header: Status
  logo: https://avatars.githubusercontent.com/u/18647660
  link: https://github.com/osnabrugge
  buttons:
    - name: Github
      link: https://github.com/osnabrugge
    - name: Homelab
      link: https://github.com/osnabrugge/home-ops

web:
  port: ${GATUS_WEB_PORT}
