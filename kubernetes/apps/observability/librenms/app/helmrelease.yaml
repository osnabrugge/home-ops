---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
# LibreNMS — Full-featured network management system with SNMP discovery and alerting.
# Requires MariaDB (deployed in same release via mariadb controller) and Redis (Dragonfly).
#
# Pre-deployment checklist:
#   1. Add AKV secrets (see externalsecret.yaml) — key: librenms
#   2. Configure SNMP communities for your network devices
#   3. Review VLAN access requirements for SNMP polling
#   4. Enable this KS by setting spec.suspend: false in ks.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: librenms
spec:
  chartRef:
    kind: OCIRepository
    name: librenms
  interval: 1h
  values:
    controllers:
      librenms:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          wait-for-db:
            image:
              repository: busybox
              tag: "1.36"
            command:
              - /bin/sh
              - -c
              - |
                until nc -z librenms-mariadb 3306; do
                  echo "Waiting for MariaDB...";
                  sleep 5;
                done
        containers:
          app:
            image:
              repository: librenms/librenms
              tag: 24.10.0
            env:
              TZ: America/Toronto
              APP_URL: https://librenms.homeops.ca
              DB_HOST: librenms-mariadb.observability.svc.cluster.local
              DB_PORT: "3306"
              DB_DATABASE: librenms
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: librenms-secret
                    key: DB_USERNAME
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: librenms-secret
                    key: DB_PASSWORD
              REDIS_HOST: dragonfly.database.svc.cluster.local
              REDIS_PORT: "6379"
              REDIS_DB: "2"
              # SNMP default community (override per-device in LibreNMS UI)
              SNMP_COMMUNITY: public
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /login
                    port: 8000
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /login
                    port: 8000
                  initialDelaySeconds: 60
                  periodSeconds: 10
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 60
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 1Gi

      # MariaDB for LibreNMS — dedicated instance, separate from CNPG PostgreSQL
      mariadb:
        containers:
          app:
            image:
              repository: mariadb
              tag: "12.2"
            env:
              TZ: America/Toronto
              MARIADB_DATABASE: librenms
              MARIADB_USER:
                valueFrom:
                  secretKeyRef:
                    name: librenms-secret
                    key: DB_USERNAME
              MARIADB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: librenms-secret
                    key: DB_PASSWORD
              MARIADB_RANDOM_ROOT_PASSWORD: "yes"
              MARIADB_INNODB_BUFFER_POOL_SIZE: "256M"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - mariadb-admin
                      - ping
                      - -h
                      - localhost
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - mariadb-admin
                      - ping
                      - -h
                      - localhost
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 5
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 512Mi

    defaultPodOptions:
      # LibreNMS requires root access for SNMP polling, cron jobs, and log file ownership.
      # Its official Docker image is designed to run as root.
      securityContext:
        runAsNonRoot: false
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: librenms
        ports:
          http:
            port: 8000
      mariadb:
        controller: mariadb
        ports:
          mysql:
            port: 3306

    route:
      app:
        hostnames: ["librenms.homeops.ca"]
        parentRefs:
          - name: envoy-internal
            namespace: network

    persistence:
      data:
        existingClaim: librenms
        advancedMounts:
          librenms:
            app:
              - path: /data
      mariadb-data:
        existingClaim: librenms-mariadb
        advancedMounts:
          mariadb:
            app:
              - path: /var/lib/mysql
      tmp:
        type: emptyDir
        advancedMounts:
          librenms:
            app:
              - path: /tmp
