apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability
patches:
- patch: |-
    apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    metadata:
      name: _
    spec:
      install:
        crds: CreateReplace
      rollback:
        cleanupOnFail: true
      upgrade:
        cleanupOnFail: true
        crds: CreateReplace
        strategy:
          name: RemediateOnFailure
        remediation:
          remediateLastFailure: true
          retries: 2
  target:
    group: helm.toolkit.fluxcd.io
    kind: HelmRelease
resources:
- ./configmap.yaml
- ./grafanadashboard.yaml
- ./grafanadashboard-pdu.yaml
- ./helmrelease.yaml
- ./ocirepository.yaml
- ./prometheusrule.yaml
