---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cyberpower-pdu
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "cacheTimeout": null,
          "colorBackground": false,
          "colorValue": false,
          "colors": ["#299c46","rgba(237, 129, 40, 0.89)","#d44a3a"],
          "datasource": "Prometheus",
          "decimals": 1,
          "format": "amp",
          "gauge": {"maxValue": 100,"minValue": 0,"show": false,"thresholdLabels": false,"thresholdMarkers": true},
          "gridPos": {"h": 7,"w": 4,"x": 0,"y": 0},
          "id": 2,
          "nullPointMode": "connected",
          "sparkline": {"fillColor": "rgba(31, 118, 189, 0.18)","full": false,"lineColor": "rgb(31, 120, 193)","show": true},
          "targets": [{"expr": "0.1*ePDULoadStatusLoad{instance=\"$instance\",ePDULoadStatusIndex=\"1\"}","format": "table","intervalFactor": 1,"refId": "A"}],
          "title": "Load - Amps",
          "type": "singlestat",
          "valueFontSize": "100%",
          "valueMaps": [{"op": "=","text": "N/A","value": "null"}],
          "valueName": "current"
        },
        {
          "cacheTimeout": null,
          "colorBackground": false,
          "colorValue": false,
          "colors": ["#d44a3a","rgba(237, 129, 40, 0.89)","#299c46"],
          "decimals": null,
          "format": "voltamp",
          "gauge": {"maxValue": 100,"minValue": 0,"show": false,"thresholdLabels": false,"thresholdMarkers": true},
          "gridPos": {"h": 7,"w": 4,"x": 4,"y": 0},
          "id": 4,
          "nullPointMode": "connected",
          "sparkline": {"fillColor": "rgba(31, 118, 189, 0.18)","full": false,"lineColor": "rgb(31, 120, 193)","show": true},
          "targets": [{"expr": "ePDULoadStatusApparentPower{instance=\"$instance\", ePDULoadStatusIndex=\"1\"}","format": "table","intervalFactor": 1,"refId": "A"}],
          "title": "Load - Volts",
          "type": "singlestat",
          "valueFontSize": "100%",
          "valueMaps": [{"op": "=","text": "N/A","value": "null"}],
          "valueName": "current"
        },
        {
          "cacheTimeout": null,
          "colorBackground": false,
          "colorValue": false,
          "colors": ["#d44a3a","rgba(237, 129, 40, 0.89)","#299c46"],
          "decimals": 0,
          "format": "watt",
          "gauge": {"maxValue": 100,"minValue": 0,"show": false,"thresholdLabels": false,"thresholdMarkers": true},
          "gridPos": {"h": 7,"w": 4,"x": 8,"y": 0},
          "id": 9,
          "nullPointMode": "connected",
          "sparkline": {"fillColor": "rgba(31, 118, 189, 0.18)","full": false,"lineColor": "rgb(31, 120, 193)","show": true},
          "targets": [{"expr": "ePDULoadStatusActivePower{instance=\"$instance\", ePDULoadStatusIndex=\"1\"}","format": "table","intervalFactor": 1,"refId": "A"}],
          "title": "Load - Watts",
          "type": "singlestat",
          "valueFontSize": "100%",
          "valueMaps": [{"op": "=","text": "N/A","value": "null"}],
          "valueName": "current"
        },
        {
          "cacheTimeout": null,
          "colorBackground": false,
          "colorValue": false,
          "colors": ["#d44a3a","rgba(237, 129, 40, 0.89)","#299c46"],
          "decimals": 2,
          "format": "none",
          "gauge": {"maxValue": 100,"minValue": 0,"show": false,"thresholdLabels": false,"thresholdMarkers": true},
          "gridPos": {"h": 7,"w": 4,"x": 12,"y": 0},
          "id": 8,
          "nullPointMode": "connected",
          "sparkline": {"fillColor": "rgba(31, 118, 189, 0.18)","full": false,"lineColor": "rgb(31, 120, 193)","show": true},
          "targets": [{"expr": "0.1*0.1*ePDULoadStatusPowerFactor{instance=\"$instance\"} > 0","format": "table","intervalFactor": 1,"refId": "A"}],
          "title": "Power Factor",
          "type": "singlestat",
          "valueFontSize": "100%",
          "valueMaps": [{"op": "=","text": "N/A","value": "null"}],
          "valueName": "current"
        },
        {
          "cacheTimeout": null,
          "colorBackground": false,
          "colorValue": false,
          "colors": ["#d44a3a","rgba(237, 129, 40, 0.89)","#299c46"],
          "decimals": 1,
          "format": "kwatth",
          "gauge": {"maxValue": 100,"minValue": 0,"show": false,"thresholdLabels": false,"thresholdMarkers": true},
          "gridPos": {"h": 7,"w": 4,"x": 16,"y": 0},
          "id": 7,
          "nullPointMode": "connected",
          "sparkline": {"fillColor": "rgba(31, 118, 189, 0.18)","full": false,"lineColor": "rgb(31, 120, 193)","show": true},
          "targets": [{"expr": "0.1*ePDULoadStatusEnergy{instance=\"$instance\"} > 0","format": "table","intervalFactor": 1,"refId": "A"}],
          "title": "Total Energy Used",
          "type": "singlestat",
          "valueFontSize": "100%",
          "valueMaps": [{"op": "=","text": "N/A","value": "null"}],
          "valueName": "current"
        },
        {
          "aliasColors": {},
          "bars": false,
          "dashLength": 10,
          "dashes": false,
          "datasource": "Prometheus",
          "decimals": 1,
          "fill": 0,
          "fillGradient": 0,
          "gridPos": {"h": 8,"w": 20,"x": 0,"y": 7},
          "hiddenSeries": false,
          "id": 6,
          "legend": {"avg": false,"current": true,"max": true,"min": true,"show": true,"total": false,"values": true},
          "lines": true,
          "linewidth": 1,
          "nullPointMode": "null",
          "targets": [{"expr": "avg(0.1*ePDUStatusInputVoltage{instance=\"$instance\"})","legendFormat": "Input","refId": "B"}],
          "title": "Voltage",
          "type": "graph",
          "yaxes": [{"format": "volt","logBase": 1,"show": true},{"format": "short","logBase": 1,"show": true}]
        },
        {
          "aliasColors": {},
          "bars": false,
          "dashLength": 10,
          "dashes": false,
          "datasource": "Prometheus",
          "decimals": 1,
          "fill": 0,
          "fillGradient": 0,
          "gridPos": {"h": 10,"w": 20,"x": 0,"y": 15},
          "hiddenSeries": false,
          "id": 10,
          "legend": {"avg": false,"current": true,"max": true,"min": true,"show": true,"total": false,"values": true},
          "lines": true,
          "linewidth": 1,
          "nullPointMode": "null",
          "targets": [{"expr": "0.1*ePDUOutletStatusLoad{instance=\"$instance\"}","legendFormat": "Outlet {{ePDUOutletStatusIndex}}","refId": "B"}],
          "title": "Outlet Load - Amps",
          "type": "graph",
          "yaxes": [{"format": "amp","logBase": 1,"show": true},{"format": "short","logBase": 1,"show": true}]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 22,
      "style": "dark",
      "tags": ["snmp","cyberpower","pdu"],
      "templating": {
        "list": [
          {
            "datasource": "Prometheus",
            "definition": "label_values(ePDUIdentName,instance)",
            "hide": 0,
            "includeAll": false,
            "label": "Device",
            "multi": false,
            "name": "instance",
            "query": "label_values(ePDUIdentName,instance)",
            "refresh": 2,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": {"from": "now-3h","to": "now"},
      "timepicker": {
        "refresh_intervals": ["5s","10s","30s","1m","5m","15m","30m","1h","2h","1d"]
      },
      "timezone": "",
      "title": "CyberPower PDU",
      "uid": "kytdGRjZz",
      "version": 11
    }
