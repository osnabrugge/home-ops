---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cyberpower-pdu
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  json: |
    {
      "annotations": {"list": [{"builtIn": 1,"datasource": "-- Grafana --","enable": true,"hide": true,"iconColor": "rgba(0, 211, 255, 1)","name": "Annotations & Alerts","type": "dashboard"}]},
      "editable": true,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "type": "stat",
          "title": "Model",
          "id": 1,
          "gridPos": {"h": 3,"w": 4,"x": 0,"y": 0},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"],"fields": "/.*/","values": false},"textMode": "name","colorMode": "none","graphMode": "none"},
          "targets": [{"expr": "ePDU2IdentModelName{instance=\"$instance\"}","instant": true,"legendFormat": "{{ePDU2IdentModelName}}","refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "type": "stat",
          "title": "Serial",
          "id": 2,
          "gridPos": {"h": 3,"w": 4,"x": 4,"y": 0},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"],"fields": "/.*/","values": false},"textMode": "name","colorMode": "none","graphMode": "none"},
          "targets": [{"expr": "ePDU2IdentSerialNumber{instance=\"$instance\"}","instant": true,"legendFormat": "{{ePDU2IdentSerialNumber}}","refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "type": "stat",
          "title": "Outlets",
          "id": 3,
          "gridPos": {"h": 3,"w": 4,"x": 8,"y": 0},
          "fieldConfig": {"defaults": {"unit": "short","color": {"mode": "fixed","fixedColor": "blue"}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]},"colorMode": "value","graphMode": "none"},
          "targets": [{"expr": "ePDU2IdentNumOutlets{instance=\"$instance\"}","instant": true,"refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "type": "stat",
          "title": "Banks",
          "id": 4,
          "gridPos": {"h": 3,"w": 4,"x": 12,"y": 0},
          "fieldConfig": {"defaults": {"unit": "short","color": {"mode": "fixed","fixedColor": "blue"}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]},"colorMode": "value","graphMode": "none"},
          "targets": [{"expr": "ePDU2IdentNumCircuits{instance=\"$instance\"}","instant": true,"refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "type": "stat",
          "title": "Outlets On",
          "id": 5,
          "gridPos": {"h": 3,"w": 4,"x": 16,"y": 0},
          "fieldConfig": {"defaults": {"unit": "short","color": {"mode": "thresholds"},"thresholds": {"mode": "absolute","steps": [{"color": "red","value": null},{"color": "green","value": 1}]}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]},"colorMode": "value","graphMode": "none"},
          "targets": [{"expr": "count(ePDU2OutletSwitchedStatus{instance=\"$instance\"} == 1)","instant": true,"refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "type": "stat",
          "title": "Uptime",
          "id": 6,
          "gridPos": {"h": 3,"w": 4,"x": 20,"y": 0},
          "fieldConfig": {"defaults": {"unit": "s","color": {"mode": "fixed","fixedColor": "blue"}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]},"colorMode": "value","graphMode": "area"},
          "targets": [{"expr": "sysUpTime{instance=\"$instance\"} / 100","instant": true,"refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "type": "stat",
          "title": "Total Load (A)",
          "id": 10,
          "gridPos": {"h": 5,"w": 6,"x": 0,"y": 3},
          "fieldConfig": {"defaults": {"unit": "amp","decimals": 2,"color": {"mode": "thresholds"},"thresholds": {"mode": "absolute","steps": [{"color": "green","value": null},{"color": "yellow","value": 12},{"color": "red","value": 14}]}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]},"colorMode": "value","graphMode": "area"},
          "targets": [{"expr": "sum(0.1 * ePDU2DeviceStatusLoad{instance=\"$instance\"})","refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "type": "stat",
          "title": "Total Power",
          "id": 11,
          "gridPos": {"h": 5,"w": 6,"x": 6,"y": 3},
          "fieldConfig": {"defaults": {"unit": "watt","decimals": 0,"color": {"mode": "thresholds"},"thresholds": {"mode": "absolute","steps": [{"color": "green","value": null},{"color": "yellow","value": 1500},{"color": "red","value": 1800}]}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]},"colorMode": "value","graphMode": "area"},
          "targets": [{"expr": "ePDU2DeviceTotalPower{instance=\"$instance\"}","refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "type": "stat",
          "title": "Input Voltage",
          "id": 12,
          "gridPos": {"h": 5,"w": 6,"x": 12,"y": 3},
          "fieldConfig": {"defaults": {"unit": "volt","decimals": 0,"color": {"mode": "fixed","fixedColor": "blue"}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]},"colorMode": "value","graphMode": "none"},
          "targets": [{"expr": "avg(ePDU2DeviceConfigVoltage{instance=\"$instance\"})","refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "type": "stat",
          "title": "Total Energy",
          "id": 13,
          "gridPos": {"h": 5,"w": 6,"x": 18,"y": 3},
          "fieldConfig": {"defaults": {"unit": "kwatth","decimals": 1,"color": {"mode": "fixed","fixedColor": "blue"}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]},"colorMode": "value","graphMode": "area"},
          "targets": [{"expr": "0.1 * ePDU2DeviceTotalEnergy{instance=\"$instance\"}","refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "type": "timeseries",
          "title": "Per-Bank Load (A)",
          "id": 20,
          "gridPos": {"h": 9,"w": 12,"x": 0,"y": 8},
          "fieldConfig": {"defaults": {"unit": "amp","custom": {"lineWidth": 1,"fillOpacity": 10,"showPoints": "never"}}},
          "options": {"legend": {"displayMode": "table","placement": "right","calcs": ["last","mean","max"]},"tooltip": {"mode": "multi"}},
          "targets": [{"expr": "0.1 * ePDU2DeviceStatusLoad{instance=\"$instance\"}","legendFormat": "Bank {{bankIndex}}","refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "type": "timeseries",
          "title": "Total Power (W)",
          "id": 21,
          "gridPos": {"h": 9,"w": 12,"x": 12,"y": 8},
          "fieldConfig": {"defaults": {"unit": "watt","custom": {"lineWidth": 1,"fillOpacity": 10,"showPoints": "never"}}},
          "options": {"legend": {"displayMode": "list","placement": "bottom"},"tooltip": {"mode": "single"}},
          "targets": [{"expr": "ePDU2DeviceTotalPower{instance=\"$instance\"}","legendFormat": "Total","refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "type": "timeseries",
          "title": "Per-Bank Energy (kWh)",
          "id": 22,
          "gridPos": {"h": 9,"w": 12,"x": 0,"y": 17},
          "fieldConfig": {"defaults": {"unit": "kwatth","custom": {"lineWidth": 1,"fillOpacity": 0,"showPoints": "never"}}},
          "options": {"legend": {"displayMode": "table","placement": "right","calcs": ["last"]},"tooltip": {"mode": "multi"}},
          "targets": [{"expr": "0.1 * ePDU2DeviceStatusEnergy{instance=\"$instance\"}","legendFormat": "Bank {{bankIndex}}","refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "type": "state-timeline",
          "title": "Outlet Switched Status (1=on 2=off)",
          "id": 23,
          "gridPos": {"h": 9,"w": 12,"x": 12,"y": 17},
          "fieldConfig": {"defaults": {"custom": {"fillOpacity": 70,"lineWidth": 0},"mappings": [{"type": "value","options": {"1": {"text": "ON","color": "green"},"2": {"text": "OFF","color": "red"}}}],"color": {"mode": "thresholds"},"thresholds": {"mode": "absolute","steps": [{"color": "green","value": null},{"color": "red","value": 2}]}}},
          "options": {"mergeValues": true,"showValue": "auto","alignValue": "left","rowHeight": 0.9,"legend": {"displayMode": "list","placement": "bottom"}},
          "targets": [{"expr": "ePDU2OutletSwitchedStatus{instance=\"$instance\"}","legendFormat": "Outlet {{outletIndex}}","refId": "A"}]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 30,
      "style": "dark",
      "tags": ["snmp","cyberpower","pdu"],
      "templating": {
        "list": [
          {
            "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
            "definition": "label_values(ePDU2IdentName, instance)",
            "hide": 0,
            "includeAll": false,
            "label": "Device",
            "multi": false,
            "name": "instance",
            "query": {"query": "label_values(ePDU2IdentName, instance)","refId": "StandardVariableQuery"},
            "refresh": 2,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": {"from": "now-3h","to": "now"},
      "timepicker": {"refresh_intervals": ["5s","10s","30s","1m","5m","15m","30m","1h","2h","1d"]},
      "timezone": "",
      "title": "CyberPower PDU",
      "uid": "kytdGRjZz",
      "version": 12
    }
