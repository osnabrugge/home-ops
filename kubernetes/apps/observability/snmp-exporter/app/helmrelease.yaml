---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app snmp-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: snmp-exporter
  interval: 1h
  values:
    fullnameOverride: *app
    serviceMonitor:
      enabled: true
      params:
        - name: ups01
          module:
            - ups
          target: 192.168.99.11
          auth:
            - public_v2
        - name: ups02
          module:
            - ups
          target: 192.168.99.12
          auth:
            - public_v2
        - name: pdu01
          module:
            - pdu
          target: 192.168.99.15
          auth:
            - public_v2
        - name: pdu02
          module:
            - pdu
          target: 192.168.99.16
          auth:
            - public_v2
      path: /snmp
      scrapeTimeout: 10s
      relabelings:
        - sourceLabels:
            - __param_target
          targetLabel: instance
