---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app snmp-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: snmp-exporter
  interval: 1h
  values:
    fullnameOverride: *app
    extraConfigmapMounts:
      - name: snmp-config
        configMap: snmp-exporter-config
        mountPath: /etc/snmp_exporter/snmp.yml
        subPath: snmp.yml
    serviceMonitor:
      enabled: true
      params:
        - name: ups01
          module:
            - cyberpower
          target: 192.168.99.11
          auth:
            - public_v2
        - name: ups02
          module:
            - cyberpower
          target: 192.168.99.12
          auth:
            - public_v2
        - name: pdu01
          module:
            - cyberpower_pdu
          target: 192.168.99.15
          auth:
            - public_v2
        - name: pdu02
          module:
            - cyberpower_pdu
          target: 192.168.99.16
          auth:
            - public_v2
        - name: synology
          module:
            - synology
          target: 192.168.99.240
          auth:
            - public_v2
        - name: core01
          module:
            - ruckus_icx
          target: 192.168.99.4
          auth:
            - public_v2
      path: /snmp
      scrapeTimeout: 10s
      relabelings:
        - sourceLabels:
            - __param_target
          targetLabel: instance