---
apiVersion: v1
kind: ConfigMap
metadata:
  name: snmp-exporter-config
data:
  snmp.yml: |-
    auths:
      public_v1:
        community: public
        security_level: noAuthNoPriv
        auth_protocol: MD5
        priv_protocol: DES
        version: 1
      public_v2:
        community: public
        security_level: noAuthNoPriv
        auth_protocol: MD5
        priv_protocol: DES
        version: 2
    modules:
      if_mib:
        walk:
          - sysUpTime
          - interfaces
          - ifXTable
        get:
          - sysDescr.0
          - sysName.0
          - sysLocation.0
          - sysContact.0
        metrics:
          - name: sysUpTime
            oid: 1.3.6.1.2.1.1.3.0
            type: gauge
            help: The time since the network management portion of the system was re-initialized - 1.3.6.1.2.1.1.3
          - name: sysDescr
            oid: 1.3.6.1.2.1.1.1.0
            type: DisplayString
          - name: sysName
            oid: 1.3.6.1.2.1.1.5.0
            type: DisplayString
          - name: ifNumber
            oid: 1.3.6.1.2.1.2.1.0
            type: gauge
