---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
spec:
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster
  interval: 1h
  values:
    # Pin the Ceph image FORWARD at v20.2.2. On 2026-07-08 the rook chart bump
    # v1.20.1->v1.20.2 started a Ceph 20.2.1->20.2.2 upgrade (mons/mgr/mds reached
    # 20.2.2); the HR upgrade timed out mid-roll and Flux auto-rolled-back to
    # v1.20.1, reverting the image to v20.2.1. mon.i (store already 20.2.2) then
    # crashlooped on 20.2.1 ("unsupported features: incompat 32=nvmeof beacon").
    # Ceph forbids downgrades, so we pin forward to where the mons already are.
    #
    # Chart v1.20.2 MOVED image config out of cephClusterSpec.cephVersion into this
    # top-level cephImage key (dedicated template block in cephcluster.yaml). Leaving
    # the old cephClusterSpec.cephVersion in place rendered cephVersion TWICE, so
    # Flux's post-render YAML parse failed and the HR upgrade got stuck (failing
    # every 15m since 2026-07-08), cascading "dependency not ready" to ~40 apps.
    cephImage:
      repository: quay.io/ceph/ceph
      tag: v20.2.2
      allowUnsupported: false
    cephClusterSpec:
      cleanupPolicy:
        wipeDevicesFromOtherClusters: true
      crashCollector:
        disable: false
      # Scrub throttling for CONSUMER Samsung 970 EVO Plus NVMe (onedr0p uses enterprise
      # Micron 7450). At the Ceph defaults (osd_scrub_sleep=0, osd_max_scrubs=3, no
      # off-peak window) deep scrubs run flat-out and spike read latency on these consumer
      # drives -> OSD sub-op stalls ("waiting for sub ops") -> heartbeat miss -> OSD flap
      # -> RBD clients remount READ-ONLY -> app crashloops (qui/HA/zigbee/spoolman etc).
      # Proven NOT physical: enp1s0f0/f1 have 0 errors/drops, bond 0 link-failures, disks
      # 4-7ms, OSDs idle (CPU ~20m, client IO <1MiB/s) when it flaps. Throttling scrubs is
      # the durable, non-physical fix. Applied at runtime 2026-07-05; pinned here.
      cephConfig:
        osd:
          osd_scrub_sleep: "0.1" # sleep between scrub chunks (default 0 = flat-out)
          osd_max_scrubs: "1" # one scrub per OSD at a time (default 3)
          osd_scrub_load_threshold: "5.0" # defer scrub when node load is high
      csi:
        readAffinity:
          enabled: false # https://github.com/ceph/ceph-csi/issues/5772
      dashboard:
        enabled: true
        urlPrefix: /
        ssl: false
        prometheusEndpoint: http://prometheus-operated.observability.svc.cluster.local:9090
      mgr:
        modules:
          - name: pg_autoscaler
            enabled: true
      network:
        connections:
          requireMsgr2: true
      resources:
        osd:
          limits:
            memory: 8Gi # Required for bootstrap
        mgr:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            # mgr working set sits at ~1Gi (prometheus module + pg_autoscaler) and was
            # pinned at 100% of Rook's 1Gi default, risking OOM -> CephMgr* alerts.
            memory: 2Gi
      storage:
        devicePathFilter: /dev/disk/by-id/nvme-Samsung_SSD_970_EVO_Plus_1TB_*
        useAllDevices: false
        useAllNodes: true
    monitoring:
      enabled: true
      createPrometheusRules: true
    toolbox:
      enabled: true
    route:
      dashboard:
        host:
          name: rook.homeops.ca
          path: /
          pathType: PathPrefix
        parentRefs:
          - name: envoy-internal
            namespace: network
    cephBlockPools:
      - name: ceph-blockpool
        spec:
          failureDomain: host
          replicated:
            size: 3
        storageClass:
          enabled: true
          name: ceph-block
          allowVolumeExpansion: true
          isDefault: true
          mountOptions:
            - discard
          parameters:
            compression_algorithm: zstd
            compression_mode: passive
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-publish-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-publish-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            imageFeatures: deep-flatten,exclusive-lock,fast-diff,layering,object-map
            imageFormat: "2"
          reclaimPolicy: Delete
          volumeBindingMode: Immediate
    cephBlockPoolsVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-blockpool
      deletionPolicy: Delete
      isDefault: true
    cephFileSystems:
      - name: ceph-filesystem
        spec:
          metadataPool:
            replicated:
              size: 3
          dataPools:
            - name: data0
              failureDomain: host
              replicated:
                size: 3
          metadataServer:
            activeCount: 1
            activeStandby: true
            placement:
              topologySpreadConstraints:
                - maxSkew: 1
                  topologyKey: kubernetes.io/hostname
                  whenUnsatisfiable: DoNotSchedule
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: ceph-mds
                      app.kubernetes.io/part-of: ceph-filesystem
            priorityClassName: system-cluster-critical
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 4Gi
        storageClass:
          enabled: true
          name: ceph-filesystem
          allowVolumeExpansion: true
          isDefault: false
          parameters:
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-publish-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/controller-publish-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
          pool: data0
          reclaimPolicy: Delete
          volumeBindingMode: Immediate
    cephFileSystemVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-filesystem
      deletionPolicy: Delete
      isDefault: false
    cephObjectStores: []
