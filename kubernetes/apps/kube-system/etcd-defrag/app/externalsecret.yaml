---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# Pulls a scoped talosconfig from AKV (full talosconfig YAML stored as the AKV secret value).
# AKV secret name: etcd-defrag  value: the talosconfig YAML, as-is (no JSON wrapping)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: etcd-defrag
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azurekv
  target:
    name: etcd-defrag-talosconfig
    template:
      type: Opaque
  data:
    - secretKey: config
      remoteRef:
        key: etcd-defrag
