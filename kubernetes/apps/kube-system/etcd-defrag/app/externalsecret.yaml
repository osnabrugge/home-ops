---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# Pulls a scoped talosconfig from AKV that has os:etcd:admin role.
# AKV secret name: etcd-defrag  required property: talosconfig (full talosconfig YAML)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: etcd-defrag
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azurekv
  target:
    name: etcd-defrag-talosconfig
    template:
      type: Opaque
      data:
        config: "{{ .talosconfig }}"
  dataFrom:
    - extract:
        key: etcd-defrag
