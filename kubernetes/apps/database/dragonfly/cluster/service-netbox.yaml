---
# Stable Redis endpoint for NetBox — targets only the Dragonfly master to avoid read-only replica errors.
apiVersion: v1
kind: Service
metadata:
  name: dragonfly-netbox
spec:
  selector:
    app: dragonfly
    app.kubernetes.io/name: dragonfly
    role: master
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
