---
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: dragonfly
spec:
  image: ghcr.io/dragonflydb/dragonfly:v1.39.0
  replicas: 3
  labels:
    role: master
  env:
    - name: MAX_MEMORY
      valueFrom:
        resourceFieldRef:
          resource: limits.memory
          divisor: 1Mi
  args:
    - --maxmemory=$(MAX_MEMORY)Mi
    - --proactor_threads=2
    - --cluster_mode=emulated
    - --lock_on_hashtags
    # django-channels (dispatcharr modular mode) runs Lua scripts that access keys
    # not passed in KEYS[]; Dragonfly rejects this by default ("script tried
    # accessing undeclared key"), which breaks the daphne/ASGI layer and stream
    # playback. Allow undeclared key access (real-Redis behaviour).
    - --default_lua_flags=allow-undeclared-keys
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/part-of: dragonfly
  resources:
    requests:
      cpu: 100m
    limits:
      memory: 512Mi
