---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# ExternalSecret for the Diode reconciler PostgreSQL user.
# AKV key: netbox-diode — must contain DIODE_DB_USERNAME and DIODE_DB_PASSWORD.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: diode-db-user
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: azurekv
  target:
    name: diode-db-user
    template:
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: "{{ .DIODE_DB_USERNAME }}"
        password: "{{ .DIODE_DB_PASSWORD }}"
  dataFrom:
    - extract:
        key: netbox-diode
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# ExternalSecret for the Ory Hydra PostgreSQL user.
# AKV key: netbox-diode — must contain HYDRA_DB_USERNAME and HYDRA_DB_PASSWORD.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hydra-db-user
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: azurekv
  target:
    name: hydra-db-user
    template:
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: "{{ .HYDRA_DB_USERNAME }}"
        password: "{{ .HYDRA_DB_PASSWORD }}"
  dataFrom:
    - extract:
        key: netbox-diode
