---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# ExternalSecret for the Dispatcharr PostgreSQL user (consumed by CNPG).
# AKV key: dispatcharr — must contain DISPATCHARR_DB_PASSWORD.
# The dispatcharr role + database are managed declaratively via spec.managed.roles
# in cluster16.yaml and a Database CR (dispatcharr-database.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dispatcharr-db-user
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: azurekv
  target:
    name: dispatcharr-db-user
    template:
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: "dispatcharr"
        password: "{{ .DISPATCHARR_DB_PASSWORD }}"
  dataFrom:
    - extract:
        key: dispatcharr
