---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# ExternalSecret for the Spoolman PostgreSQL user (consumed by the CNPG managed role).
# AKV key: spoolman — must contain SPOOLMAN_DB_PASSWORD.
# The spoolman role + database are managed declaratively via spec.managed.roles
# in cluster16.yaml and a Database CR (spoolman-database.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: spoolman-db-user
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: azurekv
  target:
    name: spoolman-db-user
    template:
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: "spoolman"
        password: "{{ .SPOOLMAN_DB_PASSWORD }}"
  dataFrom:
    - extract:
        key: spoolman
