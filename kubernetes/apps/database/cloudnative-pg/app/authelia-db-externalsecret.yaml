---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# ExternalSecret for the Authelia PostgreSQL user.
# AKV key: authelia — must contain AUTHELIA_DB_PASSWORD.
# The authelia role + database are managed declaratively via spec.managed.roles
# in cluster16.yaml and a Database CR (authelia-database.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authelia-db-user
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: azurekv
  target:
    name: authelia-db-user
    template:
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: "authelia"
        password: "{{ .AUTHELIA_DB_PASSWORD }}"
  dataFrom:
    - extract:
        key: authelia
