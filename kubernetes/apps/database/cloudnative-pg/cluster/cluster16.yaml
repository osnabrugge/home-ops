---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres16
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5-18
  bootstrap:
    initdb:
      database: netbox
      owner: netbox
      secret:
        name: netbox-db-user
  primaryUpdateStrategy: unsupervised
  storage:
    size: 20Gi
    storageClass: ceph-block
  superuserSecret:
    name: cloudnative-pg-secret
  enableSuperuserAccess: true
  backup:
    # Off-cluster logical + WAL backups to the Rook-Ceph RGW S3 store
    # (bucket cnpg-postgres16, creds from the OBC-generated secret). Enables PITR.
    retentionPolicy: 30d
    barmanObjectStore:
      destinationPath: s3://cnpg-postgres16/
      endpointURL: http://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc:80
      s3Credentials:
        accessKeyId:
          name: cnpg-postgres16
          key: AWS_ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-postgres16
          key: AWS_SECRET_ACCESS_KEY
      wal:
        compression: gzip
        maxParallel: 2
      data:
        compression: gzip
  postgresql:
    parameters:
      max_connections: "400"
      shared_buffers: 256MB
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  resources:
    requests:
      cpu: 500m
    limits:
      memory: 4Gi
  monitoring:
    enablePodMonitor: true
    podMonitorMetricRelabelings:
      - sourceLabels: ["cluster"]
        targetLabel: cnpg_cluster
        action: replace
      - regex: cluster
        action: labeldrop
  managed:
    roles:
      - name: authelia
        login: true
        superuser: false
        passwordSecret:
          name: authelia-db-user
      - name: diode
        login: true
        superuser: false
        passwordSecret:
          name: diode-db-user
      - name: hydra
        login: true
        superuser: false
        passwordSecret:
          name: hydra-db-user
      - name: dispatcharr
        login: true
        superuser: false
        passwordSecret:
          name: dispatcharr-db-user
      - name: spoolman
        login: true
        superuser: false
        passwordSecret:
          name: spoolman-db-user
