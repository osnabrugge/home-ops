---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# MongoDB auth secret — consumed by the Bitnami MongoDB Helm chart (auth.existingSecret)
# AKV key: omada-controller  required properties: MONGODB_ROOT_PASSWORD, MONGODB_PASSWORD
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: omada-db
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: azurekv
  target:
    name: omada-db-secret
    template:
      data:
        mongodb-root-password: "{{ .MONGODB_ROOT_PASSWORD }}"
        mongodb-passwords: "{{ .MONGODB_PASSWORD }}"
  dataFrom:
    - extract:
        key: omada-controller
