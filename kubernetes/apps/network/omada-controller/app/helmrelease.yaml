---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: omada-controller
spec:
  chartRef:
    kind: OCIRepository
    name: omada-controller
  interval: 1h
  values:
    controllers:
      omada-controller:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/mbentley/omada-controller
              tag: beta-6.3.0.32@sha256:a2df054d106212325f8b916a3eaec12083429af081795c2fdbfbf88d134478b9
            env:
              ROOTLESS: "true"
              MANAGE_HTTP_PORT: &http_port "8088"
              MANAGE_HTTPS_PORT: &https_port "8043"
              PORTAL_HTTP_PORT: "8080"
              PORTAL_HTTPS_PORT: "8843"
              UPGRADE_HTTPS_PORT: "8043"
              PORT_APP_DISCOVERY: "27001"
              PORT_ADOPT_V1: "29812"
              PORT_UPGRADE_V1: "29813"
              PORT_MANAGER_V1: "29811"
              PORT_MANAGER_V2: "29814"
              PORT_DISCOVERY: "29810"
              PORT_TRANSFER_V2: "29815"
              PORT_RTTY: "29816"
              PORT_DEVICE_MONITOR: "29817"
              WEB_CONFIG_OVERRIDE: "false"
              SHOW_SERVER_LOGS: "true"
              SHOW_MONGODB_LOGS: "false"
              SKIP_USERMOD: "true"
              MONGO_EXTERNAL: "true"
              # honor envoy X-Forwarded-Proto so the 443 route serves instead of 302 -> :8043
              APPLICATION_PROPERTIES: server.forward-headers-strategy=framework
              TZ: America/Toronto
            envFrom:
              - secretRef:
                  name: omada-controller-secret
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8088
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 60
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 2Gi
    defaultPodOptions:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 192.168.69.130
        externalTrafficPolicy: Local
        ports:
          http:
            port: *http_port
          https:
            port: *https_port
          discovery:
            port: 29810
            protocol: UDP
          manager:
            port: 29811
          adopt:
            port: 29812
          upgrade:
            port: 29813
          transfer:
            port: 29814
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            # gatus (observability ns) can't TCP the controller cross-namespace
            # (NetworkPolicy); fall back to the inherited guarded DNS-resolve check.
            conditions:
              - "len([BODY]) > 0"
        hostnames:
          - "{{ .Release.Name }}.homeops.ca"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: https
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /opt/tplink/EAPController/data
      logs:
        type: emptyDir
        globalMounts:
          - path: /opt/tplink/EAPController/logs
      # mbentley entrypoint imports /cert/tls.{crt,key} into the Jetty keystore so
      # 8043 serves the LE wildcard cert Envoy can validate (see BackendTLSPolicy).
      cert:
        type: secret
        name: homeops-ca-tls
        globalMounts:
          - path: /cert
            readOnly: true
