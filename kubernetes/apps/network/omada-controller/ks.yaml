---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: omada-controller
spec:
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: omada-db
      namespace: database
  interval: 1h
  path: ./kubernetes/apps/network/omada-controller/app
  patches:
    # Backups OFF (no data yet / being migrated). Keeps the PVC, pauses the RS.
    - target:
        kind: ReplicationSource
      patch: |-
        - op: add
          path: /spec/paused
          value: true
  postBuild:
    substitute:
      APP: omada-controller
      VOLSYNC_SCHEDULE: "26 * * * *"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  wait: false
