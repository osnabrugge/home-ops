---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
spec:
  chartRef:
    kind: OCIRepository
    name: konflate
  interval: 1h
  values:
    config:
      repo: github://osnabrugge/home-ops
      statusChecks: true
      prComments: true
      publicUrl: https://{{ .Release.Name }}.homeops.ca
      mcp: true
    secret:
      existingSecret: konflate-webhook-token-secret
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/endpoint: |-
          conditions: ["[STATUS] == 200"]
      parentRefs:
        - name: envoy-external
          namespace: network
      hostnames:
        - "{{ .Release.Name }}.homeops.ca"
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 50m
        # peak ~0.9Gi (was 88% of 1Gi)
        memory: 768Mi
      limits:
        memory: 1536Mi
