---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/toolhive.stacklok.dev/mcpserver_v1alpha1.json
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: brocade
spec:
  # Built from vespo92/BrocadeICXMCP by .github/workflows/brocade-mcp-image.yaml
  image: ghcr.io/osnabrugge/brocade-icx-mcp:1.0.0
  transport: stdio
  proxyMode: streamable-http
  proxyPort: 8080
  permissionProfile:
    type: builtin
    name: network
  env:
    - name: BROCADE_HOST
      value: "192.168.99.4"
    - name: BROCADE_PORT
      value: "22"
    - name: LOG_LEVEL
      value: info
  # The spec.secrets list is keyed by secret name, so it can't pull multiple keys
  # from one Secret. Inject all four BROCADE_* creds via envFrom instead.
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          envFrom:
            - secretRef:
                name: brocade-secret
  resources:
    requests:
      cpu: 25m
      memory: 96Mi
    limits:
      memory: 256Mi
  groupRef:
    name: mcp-tools
