---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: brocade
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: azurekv
  target:
    name: brocade-secret
    template:
      data:
        # SSH login for the Brocade ICX core switch (core01, 192.168.99.4)
        BROCADE_USERNAME: "{{ .BROCADE_USERNAME }}"
        BROCADE_PASSWORD: "{{ .BROCADE_PASSWORD }}"
        # Enable-mode (privileged) credentials — ICX 6450 prompts for both
        BROCADE_ENABLE_USERNAME: "{{ .BROCADE_ENABLE_USERNAME }}"
        BROCADE_ENABLE_PASSWORD: "{{ .BROCADE_ENABLE_PASSWORD }}"
  dataFrom:
    - extract:
        key: brocade
