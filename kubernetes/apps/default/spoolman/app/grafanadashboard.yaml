# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: spoolman
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  json: |
    {
      "annotations": {"list": [{"builtIn": 1,"datasource": "-- Grafana --","enable": true,"hide": true,"iconColor": "rgba(0, 211, 255, 1)","name": "Annotations & Alerts","type": "dashboard"}]},
      "editable": true,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "type": "stat",
          "title": "Total Spools",
          "id": 1,
          "gridPos": {"h": 4,"w": 6,"x": 0,"y": 0},
          "fieldConfig": {"defaults": {"unit": "none","color": {"mode": "fixed","fixedColor": "blue"}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]},"colorMode": "value","graphMode": "none","textMode": "value"},
          "targets": [{"expr": "count(spoolman_spool_price)","instant": true,"refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "type": "stat",
          "title": "Filament Remaining",
          "id": 2,
          "gridPos": {"h": 4,"w": 6,"x": 6,"y": 0},
          "fieldConfig": {"defaults": {"unit": "massg","decimals": 0,"color": {"mode": "fixed","fixedColor": "green"}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]},"colorMode": "value","graphMode": "none","textMode": "value"},
          "targets": [{"expr": "sum(spoolman_spool_initial_weight - spoolman_spool_weight_used)","instant": true,"refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "type": "stat",
          "title": "Filament Used",
          "id": 3,
          "gridPos": {"h": 4,"w": 6,"x": 12,"y": 0},
          "fieldConfig": {"defaults": {"unit": "massg","decimals": 0,"color": {"mode": "fixed","fixedColor": "orange"}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]},"colorMode": "value","graphMode": "none","textMode": "value"},
          "targets": [{"expr": "sum(spoolman_spool_weight_used)","instant": true,"refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "type": "stat",
          "title": "Inventory Value",
          "id": 4,
          "gridPos": {"h": 4,"w": 6,"x": 18,"y": 0},
          "fieldConfig": {"defaults": {"unit": "none","decimals": 2,"color": {"mode": "fixed","fixedColor": "purple"}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]},"colorMode": "value","graphMode": "none","textMode": "value"},
          "targets": [{"expr": "sum(spoolman_spool_price)","instant": true,"refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "type": "bargauge",
          "title": "Remaining Weight by Spool",
          "id": 5,
          "gridPos": {"h": 12,"w": 12,"x": 0,"y": 4},
          "fieldConfig": {"defaults": {"unit": "massg","decimals": 0,"min": 0,"color": {"mode": "continuous-GrYlRd"}}},
          "options": {"displayMode": "gradient","orientation": "horizontal","reduceOptions": {"calcs": ["lastNotNull"]},"showUnfilled": true},
          "targets": [{"expr": "(spoolman_spool_initial_weight - spoolman_spool_weight_used) * on(filament_id) group_left(name) (topk by(filament_id) (1, spoolman_filament_info))","instant": true,"legendFormat": "{{name}} (#{{spool_id}})","refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "type": "table",
          "title": "Spool Inventory",
          "id": 6,
          "gridPos": {"h": 12,"w": 12,"x": 12,"y": 4},
          "fieldConfig": {"defaults": {"custom": {"align": "auto","filterable": true}},"overrides": [{"matcher": {"id": "byName","options": "Remaining (g)"},"properties": [{"id": "unit","value": "massg"},{"id": "decimals","value": 0}]}]},
          "options": {"showHeader": true,"sortBy": [{"displayName": "Remaining (g)","desc": true}]},
          "targets": [{"expr": "(spoolman_spool_initial_weight - spoolman_spool_weight_used) * on(filament_id) group_left(name, material, vendor) (topk by(filament_id) (1, spoolman_filament_info))","instant": true,"format": "table","refId": "A"}],
          "transformations": [
            {"id": "organize","options": {"excludeByName": {"Time": true,"__name__": true,"endpoint": true,"filament_id": true,"instance": true,"job": true,"namespace": true,"pod": true,"service": true,"container": true},"indexByName": {"spool_id": 0,"name": 1,"vendor": 2,"material": 3,"Value": 4},"renameByName": {"spool_id": "Spool","name": "Filament","vendor": "Vendor","material": "Material","Value": "Remaining (g)"}}}
          ]
        }
      ],
      "refresh": "5m",
      "schemaVersion": 39,
      "tags": ["spoolman", "3d-printing"],
      "templating": {"list": []},
      "time": {"from": "now-6h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Spoolman",
      "uid": "spoolman-prometheus"
    }
