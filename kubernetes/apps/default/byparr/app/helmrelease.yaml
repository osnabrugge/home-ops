---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: byparr
spec:
  chartRef:
    kind: OCIRepository
    name: byparr
  interval: 1h
  values:
    controllers:
      byparr:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/thephaseless/byparr
              tag: latest@sha256:01a46a2865d9a6db5eb8ead04ec0dd33b8fbe233e8565ae70b50d4cc0af4cfb0
            env:
              TZ: America/Toronto
              PORT: &port 8191
              LOG_LEVEL: INFO
            probes:
              # Browser automation blocks the single HTTP server while Chrome
              # solves a challenge, making /health time out transiently. Liveness
              # must be lenient (only restart if TRULY hung); readiness can drop
              # it from the Service during a solve and recover.
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 15
                  failureThreshold: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 20
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 100m
                # Headless Chrome working set observed peaking ~2.9Gi over 7d, which
                # OOMKilled against the old 3Gi cap. Request reflects steady baseline.
                memory: 768Mi
              limits:
                # Chrome + the 1Gi /dev/shm Memory emptyDir count against this; 4Gi
                # gives the browser headroom during heavy solves to avoid OOM restarts.
                memory: 4Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      # Chromium needs a sizeable /dev/shm or tabs crash; back it with RAM.
      dev-shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        globalMounts:
          - path: /dev/shm
      tmp:
        type: emptyDir
