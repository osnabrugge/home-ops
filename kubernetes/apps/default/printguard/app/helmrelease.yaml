---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app printguard
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      printguard:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/oliverbravery/printguard
              tag: latest
            # The upstream image relies on Docker auto-creating /.dockerenv so that
            # is_running_in_docker() is true (file-based secrets in /data instead of
            # the headless-unfriendly keyring backend). containerd does not create it,
            # so we touch it before launching the app.
            #
            # We bypass printguard's own `run()` entrypoint (which wraps uvicorn in
            # self-signed HTTPS for "local" mode). Instead we launch the ASGI app
            # directly over PLAIN HTTP and let Envoy terminate/serve TLS at the edge
            # (the standard pattern for every other app in this cluster). The browser
            # still gets HTTPS via the gateway, satisfying web-push secure-context
            # requirements, while avoiding fragile backend re-encryption against
            # uvicorn's Python TLS stack. The lifespan still loads the ML model since
            # the saved startup_mode requirements are met.
            command:
              - /bin/sh
              - -c
              - touch /.dockerenv && exec python -m uvicorn printguard.app:app --host 0.0.0.0 --port 8000
            env:
              TZ: America/Toronto
              HF_HOME: /data/huggingface
              XDG_CACHE_HOME: /data/cache
              PRINTGUARD_SECRET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: printguard-secret
                    key: password
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 8000
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      # PrintGuard (pre-release) writes its ML model into its own site-packages dir
      # and expects to run as root like its upstream Docker image.
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: *app
        ports:
          # PrintGuard serves plain HTTP on this port (see container command);
          # Envoy terminates TLS at the edge, so no BackendTLSPolicy is needed.
          http:
            port: *port
            appProtocol: http
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.homeops.ca"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /data
          # Persist the downloaded model so it is not re-fetched from HuggingFace
          # on every pod restart (the app writes it into its package dir).
          - path: /usr/local/lib/python3.11/site-packages/printguard/model
            subPath: model
