---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/gateway.networking.k8s.io/backendtlspolicy_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: printguard
spec:
  # PrintGuard's "local" startup mode serves HTTPS only (uvicorn with its own
  # self-signed cert). Envoy terminates the client TLS at the gateway then
  # re-encrypts to the printguard Service, validating the backend cert against
  # the trustme CA (configmap-ca.yaml) for the SNI hostname below.
  targetRefs:
    - group: ""
      kind: Service
      name: printguard
      sectionName: https
  validation:
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: printguard-ca
    hostname: printguard.homeops.ca
