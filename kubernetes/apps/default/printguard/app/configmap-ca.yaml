---
# PrintGuard runs in "local" startup mode, which makes uvicorn serve HTTPS on
# port 8000 using a self-signed cert generated by its own setup flow (trustme).
# The matching CA below is what Envoy validates the backend against when it
# re-encrypts traffic to the Service (see backendtlspolicy.yaml).
#
# This CA is long-lived (trustme issues it with a year-3000 notAfter) and is
# pinned here so the backend-TLS handshake survives pod restarts without manual
# steps. If the PVC is ever wiped and the cert regenerated, replace this block
# with the new /data/ca.pem contents.
apiVersion: v1
kind: ConfigMap
metadata:
  name: printguard-ca
data:
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    MIIByTCCAW+gAwIBAgIUD6kIEsyx1mYyYje4bDx3wFsm95IwCgYIKoZIzj0EAwIw
