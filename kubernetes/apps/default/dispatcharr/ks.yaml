---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dispatcharr
spec:
  components:
    - ../../../../components/volsync
    - ../../../../components/zeroscaler
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/default/dispatcharr/app
  # The config PVC was originally helm-created (bound without a volsync
  # dataSourceRef). A bound PVC's spec is immutable, so re-applying the
  # volsync-templated PVC (which adds dataSourceRef) fails the dry-run and
  # blocks the whole Kustomization. Mark the PVC IfNotPresent so Flux creates
  # it once and never tries to mutate the immutable spec again.
  patches:
    - target:
        kind: PersistentVolumeClaim
      patch: |
        - op: add
          path: /metadata/labels
          value:
            kustomize.toolkit.fluxcd.io/ssa: IfNotPresent
  postBuild:
    substitute:
      APP: dispatcharr
      VOLSYNC_SCHEDULE: "0 3 * * *"
      VOLSYNC_CAPACITY: 10Gi
      VOLSYNC_CACHE_CAPACITY: 5Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  wait: false
