---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# Dispatcharr app secret — supplies the PostgreSQL password to the web + celery
# containers (modular mode). AKV key: dispatcharr -> DISPATCHARR_DB_PASSWORD.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dispatcharr-secret
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: azurekv
  target:
    name: dispatcharr-secret
    template:
      data:
        POSTGRES_PASSWORD: "{{ .DISPATCHARR_DB_PASSWORD }}"
  dataFrom:
    - extract:
        key: dispatcharr
