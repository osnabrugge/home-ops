---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: beets
spec:
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/default/beets/app
  patches:
    # Backups OFF (music library cleanup pending; beets being reworked).
    - target:
        kind: ReplicationSource
      patch: |-
        - op: add
          path: /spec/paused
          value: true
  postBuild:
    substitute:
      APP: beets
      VOLSYNC_SCHEDULE: "10 * * * *"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  wait: false
