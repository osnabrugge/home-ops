---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frigate
spec:
  chartRef:
    kind: OCIRepository
    name: frigate
  interval: 1h
  values:
    controllers:
      frigate:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          nodeSelector:
            google.feature.node.kubernetes.io/coral: "true"
            node.kubernetes.io/gpu: "true"
        initContainers:
          init-config:
            image:
              repository: ghcr.io/blakeblackshear/frigate
              tag: 0.17.2
            command:
              - sh
              - -c
              - cp -v /config-src/config.yml /config/config.yml
        containers:
          app:
            image:
              repository: ghcr.io/blakeblackshear/frigate
              tag: 0.17.2
            env:
              TZ: America/Toronto
              LIBVA_DRIVER_NAME: iHD
            envFrom:
              - secretRef:
                  name: frigate-secret
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/version
                    port: &port 5000
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 60
                  periodSeconds: 10
            securityContext:
              privileged: true
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 200m
                memory: 1Gi
              limits:
                memory: 4Gi
    defaultPodOptions:
      securityContext:
        supplementalGroups:
          - 1000
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: frigate
    service:
      app:
        ports:
          http:
            port: *port
          rtsp:
            port: 8554
          webrtc:
            port: 8555
          webrtc-udp:
            port: 8555
            protocol: UDP
    route:
      app:
        hostnames: ["{{ .Release.Name }}.homeops.ca"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /config
      config-src:
        type: configMap
        identifier: config
        globalMounts:
          - path: /config-src/config.yml
            subPath: config.yml
            readOnly: true
      cache:
        type: emptyDir
        medium: Memory
        sizeLimit: 2Gi
        globalMounts:
          - path: /tmp/cache
      shm:
        # Frigate needs >=114MB /dev/shm for two 1080p cameras; default is 64MB.
        type: emptyDir
        medium: Memory
        sizeLimit: 256Mi
        globalMounts:
          - path: /dev/shm
      media:
        type: nfs
        server: nas02.in.homeops.ca
        path: /volume1/data/frigate
        globalMounts:
          - path: /media/frigate
      usb:
        type: hostPath
        hostPath: /dev/bus/usb
        hostPathType: Directory
        globalMounts:
          - path: /dev/bus/usb
    configMaps:
      config:
        enabled: true
        data:
          config.yml: |
            mqtt:
              enabled: true
              host: mosquitto.default.svc.cluster.local
              port: 1883
              topic_prefix: frigate
              client_id: frigate
            detectors:
              coral:
                type: edgetpu
                device: usb
            ffmpeg:
              hwaccel_args: preset-vaapi
            objects:
              track:
                - person
                - car
                - dog
                - cat
            record:
              enabled: true
              motion:
                days: 7
              alerts:
                retain:
                  days: 14
                  mode: motion
              detections:
                retain:
                  days: 14
                  mode: motion
            snapshots:
              enabled: true
              retain:
                default: 14
            cameras:
              cam01:
                ffmpeg:
                  inputs:
                    - path: rtsp://viewer:{FRIGATE_RTSP_PASSWORD}@192.168.70.71:554/cam/realmonitor?channel=1&subtype=0
                      input_args: preset-rtsp-generic
                      roles: [record]
                    - path: rtsp://viewer:{FRIGATE_RTSP_PASSWORD}@192.168.70.71:554/cam/realmonitor?channel=1&subtype=1
                      input_args: preset-rtsp-generic
                      roles: [detect]
                # detect width/height omitted -> Frigate auto-detects from the stream.
                detect:
                  enabled: true
                  fps: 5
              cam02:
                ffmpeg:
                  inputs:
                    - path: rtsp://viewer:{FRIGATE_RTSP_PASSWORD}@192.168.70.72:554/cam/realmonitor?channel=1&subtype=0
                      input_args: preset-rtsp-generic
                      roles: [record]
                    - path: rtsp://viewer:{FRIGATE_RTSP_PASSWORD}@192.168.70.72:554/cam/realmonitor?channel=1&subtype=1
                      input_args: preset-rtsp-generic
                      roles: [detect]
                detect:
                  enabled: true
                  fps: 5
            # cam03 (192.168.70.73): PoE link up but no IP yet — likely a hard-coded
            #   static IP on the camera. Add a stream+camera block once it's reachable
            #   on :554 (probe currently fails).
            # cam04 (192.168.70.74): still boxed / not deployed.
            version: 0.17-0
