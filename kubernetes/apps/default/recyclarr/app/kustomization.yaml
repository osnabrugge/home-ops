apiVersion: kustomize.config.k8s.io/v1beta1
components:
- ../../../../components/volsync
configMapGenerator:
- files:
  - recyclarr.yml=./resources/recyclarr.yml
  name: recyclarr-configmap
generatorOptions:
  disableNameSuffixHash: true
kind: Kustomization
namespace: default
patches:
- patch: |-
    apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    metadata:
      name: _
    spec:
      install:
        crds: CreateReplace
      rollback:
        cleanupOnFail: true
      upgrade:
        cleanupOnFail: true
        crds: CreateReplace
        strategy:
          name: RemediateOnFailure
        remediation:
          remediateLastFailure: true
          retries: 2
  target:
    group: helm.toolkit.fluxcd.io
    kind: HelmRelease
resources:
- ./externalsecret.yaml
- ./helmrelease.yaml
- ./ocirepository.yaml
