---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbox
spec:
  chartRef:
    kind: OCIRepository
    name: netbox
  interval: 1h
  values:
    updateStrategy:
      type: Recreate
    worker:
      updateStrategy:
        type: Recreate
    allowedHosts:
      - netbox.homeops.ca
    timeZone: America/Toronto
    existingSecret: netbox-secret
    superuser:
      existingSecret: netbox-secret
    postgresql:
      enabled: false
    externalDatabase:
      host: postgres16-rw.database.svc.cluster.local
      port: 5432
      database: netbox
      username: netbox
      existingSecretName: netbox-secret
      existingSecretKey: postgresql-password
      options:
        sslmode: disable
        target_session_attrs: read-write
    valkey:
      enabled: false
    tasksDatabase:
      host: dragonfly.database.svc.cluster.local
      port: 6379
      database: 0
      existingSecretName: netbox-secret
      existingSecretKey: tasks-password
    cachingDatabase:
      host: dragonfly.database.svc.cluster.local
      port: 6379
      database: 1
      existingSecretName: netbox-secret
      existingSecretKey: cache-password
    persistence:
      enabled: true
      existingClaim: netbox
    httpRoute:
      enabled: true
      hostnames:
        - netbox.homeops.ca
      parentRefs:
        - name: envoy-internal
          namespace: network
    ingress:
      enabled: false
