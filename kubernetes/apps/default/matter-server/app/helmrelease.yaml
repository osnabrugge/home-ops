---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matter-server
spec:
  chartRef:
    kind: OCIRepository
    name: matter-server
  interval: 1h
  values:
    controllers:
      matter-server:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/matter-js/matterjs-server
              tag: 1.3.1@sha256:4933a93ab96f361708af785a2f8c77c6b7e8f890f0464a73c970d782e4528827
            env:
              # Node.js image: cap the V8 heap below the 1Gi limit to avoid OOM-kill.
              NODE_OPTIONS: --max-old-space-size=768
            args:
              - --storage-path
              - /data
              - --port
              - "5580"
              - --primary-interface
              - net1
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              # matterjs-server defaults to UID 1000; kept as root so the root-owned /data
              # from the old python image stays writable (drop-in migration) + NET_RAW ping.
              runAsUser: 0
              runAsGroup: 0
              allowPrivilegeEscalation: false
              capabilities:
                add: ["NET_ADMIN", "NET_RAW"]
                drop: ["ALL"]
    defaultPodOptions:
      # Attach to the IoT VLAN (VLAN70) so the Matter stack shares L2 with the
      # SLZB OTBR (otbr01, wired) and Matter devices, matching the zigbee/HA pattern.
      annotations:
        k8s.v1.cni.cncf.io/networks: |-
          [{
            "name": "iot",
            "namespace": "kube-system",
            "ips": ["192.168.70.21/24"],
            "mac": "c6:07:27:af:fb:54"
          }]
      securityContext:
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            appProtocol: kubernetes.io/ws
            port: 5580
    persistence:
      data:
        existingClaim: matter-server-data
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
