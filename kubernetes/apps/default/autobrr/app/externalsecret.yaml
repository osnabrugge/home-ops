---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: autobrr
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: azurekv
  target:
    name: autobrr-secret
    template:
      data:
        AUTOBRR__SESSION_SECRET: "{{ get . \"AUTOBRR_SESSION_SECRET\" | default \"\" }}"
        AUTOBRR_BOOTSTRAP_USERNAME: "{{ get . \"AUTOBRR_BOOTSTRAP_USERNAME\" | default \"\" }}"
        AUTOBRR_BOOTSTRAP_PASSWORD: "{{ get . \"AUTOBRR_BOOTSTRAP_PASSWORD\" | default \"\" }}"
        AUTOBRR_QBITTORRENT_USERNAME: "{{ get . \"AUTOBRR_QBITTORRENT_USERNAME\" | default \"\" }}"
        AUTOBRR_QBITTORRENT_PASSWORD: "{{ get . \"AUTOBRR_QBITTORRENT_PASSWORD\" | default \"\" }}"
        # Tracker IRC credentials
        BLUTOPIA_PASSKEY: "{{ get . \"BLUTOPIA_PASSKEY\" | default \"\" }}"
        BLUTOPIA_IRC_PASSWORD: "{{ get . \"BLUTOPIA_IRC_PASSWORD\" | default \"\" }}"
        FEARNOPEER_AUTHKEY: "{{ get . \"FEARNOPEER_AUTHKEY\" | default \"\" }}"
        FEARNOPEER_IRC_PASSWORD: "{{ get . \"FEARNOPEER_IRC_PASSWORD\" | default \"\" }}"
        UPLOADCX_INFOHASH: "{{ get . \"UPLOADCX_INFOHASH\" | default \"\" }}"
        UPLOADCX_IRC_PASSWORD: "{{ get . \"UPLOADCX_IRC_PASSWORD\" | default \"\" }}"
  dataFrom:
    - extract:
        key: autobrr
