---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: autobrr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: azurekv
  target:
    name: autobrr-secret
    template:
      data:
        AUTOBRR__SESSION_SECRET: "{{ .AUTOBRR_SESSION_SECRET }}"
        # Tracker IRC credentials
        BLUTOPIA_PASSKEY: "{{ .BLUTOPIA_PASSKEY }}"
        BLUTOPIA_IRC_PASSWORD: "{{ .BLUTOPIA_IRC_PASSWORD }}"
        FEARNOPEER_AUTHKEY: "{{ .FEARNOPEER_AUTHKEY }}"
        FEARNOPEER_IRC_PASSWORD: "{{ .FEARNOPEER_IRC_PASSWORD }}"
        UPLOADCX_INFOHASH: "{{ .UPLOADCX_INFOHASH }}"
        UPLOADCX_IRC_PASSWORD: "{{ .UPLOADCX_IRC_PASSWORD }}"
  dataFrom:
    - extract:
        key: autobrr
    - extract:
        key: tracker-credentials
