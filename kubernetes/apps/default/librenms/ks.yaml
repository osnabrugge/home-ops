---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# LibreNMS deployment — suspended until NetBox is stable.
# Depends on netbox being healthy and a separate MariaDB instance.
# Enable by setting spec.suspend: false once dependencies are met.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: librenms
spec:
  suspend: true
  dependsOn:
    - name: netbox
  interval: 1h
  path: ./kubernetes/apps/default/librenms/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  wait: true
