---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: volsync
spec:
  groups:
    - name: volsync.rules
      rules:
        - alert: VolSyncComponentAbsent
          expr: |-
            absent(up{job="volsync-metrics"})
          annotations:
            summary: >-
              VolSync component has disappeared from Prometheus target discovery
          for: 5m
          labels:
            severity: critical

        - alert: VolSyncVolumeOutOfSync
          # OFF-tier (paused) backups are intentionally never synced, so they
          # would page forever. Exclude them. Keep this list aligned with the
          # paused apps in docs/BACKUP-TIERS.md.
          expr: |-
            volsync_volume_out_of_sync{obj_name!~"agregarr|beets|brrpolice|dashbrr|frigate|lidarr|netbox|omada-controller|printguard|recyclarr|tautulli"} == 1
          annotations:
            summary: >-
              {{ $labels.obj_namespace }}/{{ $labels.obj_name }} volume is out of sync
          for: 5m
          labels:
            severity: critical
