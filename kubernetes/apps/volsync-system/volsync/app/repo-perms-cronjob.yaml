---
# Normalizes kopia repository blob permissions to group-readable.
#
# Why this exists: VolSync movers run as mixed uids — most as uid 1000 (which kopia
# writes group-readable 0660), but root-running movers and the KopiaMaintenance job get
# NFS root-squashed to uid 1024 and write owner-only 0600 index blobs. The uid-1000
# movers (group 1000) then get "permission denied" reading those blobs and backups fail.
# kopia's file-mode can't be set through VolSync (additionalArgs only reach snapshot/restore,
# not the repository connect), so we re-grant group access here. Metadata only — never
# touches blob contents. Runs frequently and only on recently-written files lacking group
# read, so it's cheap and overlaps the hourly backups + 03:30/15:30 maintenance windows.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kopia-repo-perms
  namespace: volsync-system
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      # 300s was too short: the two find passes walk the whole NFS repo tree and, with
      # any backlog of 0600 blobs to chmod, routinely blew the 5-min deadline -> the Job
      # died DeadlineExceeded and NEVER fixed perms, so unreadable index blobs piled up
      # (1600+ stragglers) and every volsync mover crash-looped on "permission denied",
      # churning Ceph RBD on the mover's node and flapping that node's OSD. 15 min gives
      # the sweep room to finish even on a slow NFS / large repo.
      activeDeadlineSeconds: 900
      template:
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          # Run as uid 1024 (the uid nas02 squashes root/maintenance writes to) so
          # we are the OWNER of the 0600 index blobs and can actually chmod them.
          # As root we get NFS-squashed and the chmod silently fails.
          securityContext:
            runAsGroup: 1000
            runAsNonRoot: true
          containers:
            # Two passes: kopia writes index blobs 0600 (owner-only) regardless of
            # the writer uid. Root-running movers/maintenance get NFS-squashed to
            # uid 1024; uid-1000 movers (and the browser) write as 1000. NFS ignores
            # FOWNER cross-owner, so each uid can only chmod its OWN files -> we need
            # one container per owner uid or the other class stays unreadable and the
            # squashed-root movers fail with "permission denied" on x/<shard>.
            - name: chmod-1024
              image: busybox:1.38
              command:
                - sh
                - -c
                - >
                  find /repository -mmin -180 -user 1024 -type f ! -perm -040 -exec chmod g+rX {} + 2>/dev/null;
                  find /repository -mmin -180 -user 1024 -type d -exec chmod g+rwxs {} + 2>/dev/null;
                  echo "1024 pass: $(find /repository -mmin -180 -user 1024 -type f ! -perm -040 2>/dev/null | wc -l) remaining"
              resources:
                requests: { cpu: 10m, memory: 32Mi }
                limits: { memory: 64Mi }
              securityContext:
                runAsUser: 1024
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                  add: ["FOWNER"]
              volumeMounts:
                - name: repository
                  mountPath: /repository
            - name: chmod-1000
              image: busybox:1.38
              command:
                - sh
                - -c
                - >
                  find /repository -mmin -180 -user 1000 -type f ! -perm -040 -exec chmod g+rX {} + 2>/dev/null;
                  find /repository -mmin -180 -user 1000 -type d -exec chmod g+rwxs {} + 2>/dev/null;
                  echo "1000 pass: $(find /repository -mmin -180 -user 1000 -type f ! -perm -040 2>/dev/null | wc -l) remaining"
              resources:
                requests: { cpu: 10m, memory: 32Mi }
                limits: { memory: 64Mi }
              securityContext:
                runAsUser: 1000
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                  add: ["FOWNER"]
              volumeMounts:
                - name: repository
                  mountPath: /repository
          volumes:
            - name: repository
              nfs:
                server: nas02.in.homeops.ca
                path: /volume1/data/kopia
