---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/volsync.backube/kopiamaintenance_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: KopiaMaintenance
metadata:
  name: daily
spec:
  enabled: true
  trigger:
    schedule: 30 3,15 * * *
  # MUST match the ReplicationSource mover uid (1000, see components/volsync/
  # replicationsource.yaml). Without this the maintenance mover runs as root and
  # nas02 NFS root-squashes it to uid 1024, so it writes compacted index blobs
  # owned 1024:0600 that the uid-1000 backup movers CANNOT read -> movers hang on
  # repo connect -> VolSyncVolumeOutOfSync + failed maintenance. This is the durable
  # fix for the recurring kopia permission problem.
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  moverVolumes:
    - mountPath: repository
      volumeSource:
        nfs:
          path: /volume1/data/kopia
          server: nas02.in.homeops.ca
  repository:
    repository: volsync-maintenance-secret
