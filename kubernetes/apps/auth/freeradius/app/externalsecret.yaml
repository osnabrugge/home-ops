---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: freeradius
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: azurekv
  target:
    name: freeradius-secret
    template:
      data:
        # LDAP bind password for FreeRADIUS→LLDAP auth lookups
        LDAP_BIND_PASSWORD: "{{ .FREERADIUS_LDAP_PASSWORD }}"
        # Pre-shared keys for RADIUS clients (network devices)
        # Format: <nas-identifier>=<shared-secret>
        NAS_SECRET_OPNSENSE: "{{ .FREERADIUS_NAS_SECRET_OPNSENSE }}"
        NAS_SECRET_OMADA: "{{ .FREERADIUS_NAS_SECRET_OMADA }}"
  dataFrom:
    - extract:
        key: freeradius
