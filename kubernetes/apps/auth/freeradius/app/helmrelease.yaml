---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: freeradius
spec:
  chartRef:
    kind: OCIRepository
    name: freeradius
  interval: 1h
  values:
    controllers:
      freeradius:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/freeradius/freeradius-server
              tag: 3.2.8
            env:
              TZ: America/Toronto
            envFrom:
              - secretRef:
                  name: freeradius-secret
            # FreeRADIUS runs as root by default; override configs via mounts
            command:
              - freeradius
              - -f
              - -l
              - stdout
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - "pgrep freeradius || exit 1"
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
                add: ["NET_BIND_SERVICE"]
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        type: LoadBalancer
        annotations:
          # Dedicated IP so OPNsense and Omada can reach RADIUS directly
          lbipam.cilium.io/ips: 192.168.69.124
        externalTrafficPolicy: Local
        ports:
          radius-auth:
            port: 1812
            protocol: UDP
          radius-acct:
            port: 1813
            protocol: UDP
    persistence:
      config-clients:
        type: configMap
        name: freeradius-config
        globalMounts:
          - path: /etc/freeradius/clients.conf
            subPath: clients.conf
            readOnly: true
      config-ldap:
        type: configMap
        name: freeradius-config
        globalMounts:
          - path: /etc/freeradius/mods-available/ldap
            subPath: ldap.conf
            readOnly: true
      config-default:
        type: configMap
        name: freeradius-config
        globalMounts:
          - path: /etc/freeradius/sites-available/default
            subPath: default
            readOnly: true
