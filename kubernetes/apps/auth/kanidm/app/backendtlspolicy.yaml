---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/gateway.networking.k8s.io/backendtlspolicy_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: kanidm
spec:
  # Kanidm serves HTTPS only. Envoy terminates the client TLS at the gateway
  # then re-encrypts to the kanidm Service. The backend presents the wildcard
  # *.homeops.ca cert (Let's Encrypt), validated against the system trust store
  # for the SNI hostname below.
  targetRefs:
    - group: ""
      kind: Service
      name: kanidm
      sectionName: https
  validation:
    wellKnownCACertificates: System
    hostname: kanidm.homeops.ca
