---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kanidm-config
data:
  # Kanidm server configuration. The container reads /data/server.toml by
  # default; this file is mounted over that path via subPath. TLS is mandatory:
  # the wildcard *.homeops.ca cert (kanidm-tls secret) is mounted at /certs and
  # referenced below. Envoy terminates the client TLS at the gateway and
  # re-encrypts to this backend (see backendtlspolicy.yaml).
  server.toml: |
    version = "2"

    bindaddress = "0.0.0.0:8443"
    ldapbindaddress = "0.0.0.0:3636"

    db_path = "/data/kanidm.db"

    tls_chain = "/certs/tls.crt"
    tls_key = "/certs/tls.key"

    domain = "kanidm.homeops.ca"
    origin = "https://kanidm.homeops.ca"

    log_level = "info"

    # Trust X-Forwarded-For from the in-cluster pod network (Envoy Gateway) so
    # client IPs are logged correctly.
    [http_client_address_info]
    x-forward-for = ["10.42.0.0/16"]

    [online_backup]
    path = "/data/backups/"
    schedule = "00 22 * * *"
    versions = 7
