---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kanidm-tls
spec:
  # Kanidm mandates TLS on its own origin, so the wildcard *.homeops.ca cert is
  # imported into the auth namespace and mounted into the pod. refreshInterval
  # keeps the copy current as cert-manager rotates the LE cert; the reloader
  # annotation on the HelmRelease restarts kanidm to pick up the new cert.
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azurekv
  target:
    name: kanidm-tls
    template:
      type: kubernetes.io/tls
  dataFrom:
    - extract:
        key: homeops-ca-tls
        decodingStrategy: Base64
