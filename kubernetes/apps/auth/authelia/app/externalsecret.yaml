---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authelia
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: azurekv
  target:
    name: authelia-secret
    template:
      data:
        # OIDC HMAC secret (32+ bytes random hex)
        AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET: "{{ .AUTHELIA_OIDC_HMAC_SECRET }}"
        # OIDC issuer private key (RSA-4096 PEM)
        AUTHELIA_IDENTITY_PROVIDERS_OIDC_ISSUER_PRIVATE_KEY: "{{ .AUTHELIA_OIDC_ISSUER_PRIVATE_KEY }}"
        # JWT signing secret (32+ bytes random)
        AUTHELIA_JWT_SECRET: "{{ .AUTHELIA_JWT_SECRET }}"
        # Session secret
        AUTHELIA_SESSION_SECRET: "{{ .AUTHELIA_SESSION_SECRET }}"
        # Storage encryption key
        AUTHELIA_STORAGE_ENCRYPTION_KEY: "{{ .AUTHELIA_STORAGE_ENCRYPTION_KEY }}"
        # PostgreSQL password
        AUTHELIA_STORAGE_POSTGRES_PASSWORD: "{{ .AUTHELIA_DB_PASSWORD }}"
        # LDAP (LLDAP) service account password for Authelia read access
        AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD: "{{ .AUTHELIA_LDAP_PASSWORD }}"
        # SMTP relay password
        AUTHELIA_NOTIFIER_SMTP_PASSWORD: "{{ .AUTHELIA_SMTP_PASSWORD }}"
        # OIDC client secrets for registered apps (Proxmox, Grafana, etc.)
        AUTHELIA_OIDC_CLIENT_PROXMOX_SECRET: "{{ .AUTHELIA_OIDC_CLIENT_PROXMOX_SECRET }}"
        AUTHELIA_OIDC_CLIENT_GRAFANA_SECRET: "{{ .AUTHELIA_OIDC_CLIENT_GRAFANA_SECRET }}"
        AUTHELIA_OIDC_CLIENT_NETBOX_SECRET: "{{ .AUTHELIA_OIDC_CLIENT_NETBOX_SECRET }}"
  dataFrom:
    - extract:
        key: authelia
