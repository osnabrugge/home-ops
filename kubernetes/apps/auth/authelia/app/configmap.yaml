---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-config
data:
  configuration.yaml: |
    ---
    theme: dark
    default_redirection_url: https://auth.homeops.ca

    log:
      level: info

    server:
      address: tcp://0.0.0.0:9091

    # Use LLDAP as the authentication backend
    authentication_backend:
      refresh_interval: 1m
      ldap:
        implementation: custom
        url: ldap://lldap.auth.svc.cluster.local:3890
        timeout: 5s
        start_tls: false
        base_dn: dc=homeops,dc=ca
        username_attribute: uid
        additional_users_dn: ou=people
        users_filter: "(&(|({username_attribute}={input})({mail_attribute}={input}))(objectClass=person))"
        additional_groups_dn: ou=groups
        groups_filter: "(member={dn})"
        group_name_attribute: cn
        mail_attribute: mail
        display_name_attribute: displayName
        user: uid=authelia,ou=people,dc=homeops,dc=ca
        password: ""  # injected from AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD env var

    # Session configuration
    session:
      name: authelia_session
      domain: homeops.ca
      same_site: lax
      expiration: 12h
      inactivity: 45m
      remember_me_duration: 7d

    # Persistent storage (PostgreSQL via CloudNative-PG)
    storage:
      postgres:
        host: postgres16-rw.database.svc.cluster.local
        port: 5432
        database: authelia
        schema: public
        username: authelia
        ssl:
          mode: disable

    # Email notifications (via smtp-relay)
    # NOTE: smtp-relay (maddy) Service exposes port 25 only; do not use 587 here.
    notifier:
      disable_startup_check: true
      smtp:
        address: smtp://smtp-relay.default.svc.cluster.local:25
        sender: Authelia <auth@homeops.ca>
        disable_require_tls: true

    # TOTP settings
    totp:
      issuer: homeops.ca
      period: 30
      skew: 1

    # WebAuthn / Passkey settings
    webauthn:
      display_name: homeops.ca
      attestation_conveyance_preference: indirect
      selection_criteria:
        user_verification: preferred

    # Access control policies
    # Default: deny. MFA (2FA = TOTP/WebAuthn) is only required from OUTSIDE the
    # home network, and only for control-plane / infrastructure apps. Internal LAN
    # access uses a single factor (password). "internal" = home VLANs + cluster.
    access_control:
      default_policy: deny
      networks:
        - name: internal
          networks:
            - 192.168.0.0/16   # home LAN (all VLANs)
            - 10.42.0.0/16      # cluster pod network
            - 10.43.0.0/16      # cluster service network
      rules:
        # Bypass auth for the auth portal itself
        - domain: auth.homeops.ca
          policy: bypass

        # Control-plane / infra apps: 1FA on the LAN, 2FA from the internet
        - domain:
            - opnsense.homeops.ca
            - omada.homeops.ca
            - omada-controller.homeops.ca
            - netbox.homeops.ca
            - proxmox.homeops.ca
          networks:
            - internal
          subject:
            - "group:admins"
          policy: one_factor
        - domain:
            - opnsense.homeops.ca
            - omada.homeops.ca
            - omada-controller.homeops.ca
            - netbox.homeops.ca
            - proxmox.homeops.ca
          subject:
            - "group:admins"
          policy: two_factor

        # Everything else under *.homeops.ca: single factor for known groups
        - domain:
            - "*.homeops.ca"
          networks:
            - internal
          subject:
            - "group:admins"
            - "group:users"
          policy: one_factor
        - domain:
            - "*.homeops.ca"
          subject:
            - "group:remote"
          policy: one_factor

        # Catch-all: deny everything else
        - domain: "*.homeops.ca"
          policy: deny

    # OIDC provider for SSO integration with Proxmox, Grafana, NetBox, etc.
    identity_providers:
      oidc:
        # Custom policy: 2FA by default, but only 1FA when the client connects from
        # an internal/home network. Applied to control-plane OIDC clients so MFA is
        # only enforced from outside the LAN (falls back to 2FA if IP is unknown).
        authorization_policies:
          two_factor_external:
            default_policy: two_factor
            rules:
              - policy: one_factor
                networks:
                  - 192.168.0.0/16
                  - 10.42.0.0/16
                  - 10.43.0.0/16
        cors:
          endpoints:
            - authorization
            - token
            - revocation
            - introspection
          allowed_origins_from_client_redirect_uris: true
        clients:
          # Proxmox VE
          - id: proxmox
            description: Proxmox VE
            # secret injected at runtime via X_AUTHELIA_CONFIG_FILTERS=template
            # and the AUTHELIA_OIDC_CLIENT_PROXMOX_SECRET env var from authelia-secret
            client_secret: '$plaintext${{ env "OIDC_CLIENT_PROXMOX_SECRET" }}'
            public: false
            authorization_policy: two_factor_external
            redirect_uris:
              - https://proxmox.homeops.ca
            scopes:
              - openid
              - profile
              - email
              - groups
            userinfo_signing_algorithm: none

          # Grafana
          - id: grafana
            description: Grafana
            # secret injected at runtime via X_AUTHELIA_CONFIG_FILTERS=template
            client_secret: '$plaintext${{ env "OIDC_CLIENT_GRAFANA_SECRET" }}'
            public: false
            authorization_policy: one_factor
            redirect_uris:
              - https://grafana.homeops.ca/login/generic_oauth
            scopes:
              - openid
              - profile
              - email
              - groups
            userinfo_signing_algorithm: none

          # NetBox
          - id: netbox
            description: NetBox IPAM
            # secret injected at runtime via X_AUTHELIA_CONFIG_FILTERS=template
            client_secret: '$plaintext${{ env "OIDC_CLIENT_NETBOX_SECRET" }}'
            public: false
            authorization_policy: two_factor_external
            redirect_uris:
              - https://netbox.homeops.ca/oidc/callback/
            scopes:
              - openid
              - profile
              - email
              - groups
            userinfo_signing_algorithm: none
