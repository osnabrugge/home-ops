---
apiVersion: v1alpha1
kind: BondConfig
name: bond0
links:
  - enp1s0f0
  - enp1s0f1
bondMode: 802.3ad
miimon: 1000
xmitHashPolicy: layer3+4
lacpRate: fast
mtu: 9000
---
apiVersion: v1alpha1
kind: DHCPv4Config
name: bond0
clientIdentifier: mac
---
apiVersion: v1alpha1
kind: VLANConfig
name: bond0.70
vlanID: 70
parent: bond0
mtu: 9000
---
apiVersion: v1alpha1
kind: VLANConfig
name: bond0.99
vlanID: 99
parent: bond0
mtu: 9000
---
apiVersion: v1alpha1
kind: EthernetConfig
name: bond0
features:
  rx-gro-list: off
  rx-udp-gro-forwarding: on
---
apiVersion: v1alpha1
kind: EthernetConfig
name: enp1s0f0
rings:
  rx: 8160
  tx: 8160
features:
  rx-gro-list: off
  rx-udp-gro-forwarding: on
---
apiVersion: v1alpha1
kind: EthernetConfig
name: enp1s0f1
rings:
  rx: 8160
  tx: 8160
features:
  rx-gro-list: off
  rx-udp-gro-forwarding: on
