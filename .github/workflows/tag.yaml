---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Tag

on:
  workflow_dispatch:
  schedule:
    - cron: 0 0 1 * *

permissions:
  id-token: write
  contents: read

jobs:
  main:
    name: Tag
    runs-on: ubuntu-latest
    environment: "Github Action Runner"
    permissions:
      id-token: write
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Load Secrets
        id: load-secrets
        run: |
          SECRET=$(az keyvault secret show \
            --vault-name ${{ secrets.KEYVAULT_NAME }} \
            --name github-bot \
            --query value -o tsv)

          PRIVATE_KEY=$(echo "$SECRET" | jq -r '.GITHUB_BOT_APP_PRIVATE_KEY_B64' | base64 -d)
          echo "::add-mask::$PRIVATE_KEY"

          echo "GITHUB_BOT_APP_CLIENT_ID=$(echo "$SECRET" | jq -r '.GITHUB_BOT_APP_CLIENT_ID')" >> $GITHUB_OUTPUT
          {
            echo "GITHUB_BOT_APP_PRIVATE_KEY<<PEM_EOF"
            echo "$PRIVATE_KEY"
            echo "PEM_EOF"
          } >> $GITHUB_OUTPUT

      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ steps.load-secrets.outputs.GITHUB_BOT_APP_CLIENT_ID }}
          private-key: ${{ steps.load-secrets.outputs.GITHUB_BOT_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Get Previous Tag and Determine Next Tag
        id: determine-next-tag
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          result-encoding: string
          script: |
            const { data: tags } = await github.rest.repos.listTags({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1,
            });

            const prevTag = tags[0]?.name || "0.0.0"; // Default to "0.0.0" if no tags exist
            const [prevMajor, prevMinor, prevPatch] = prevTag.split('.').map(Number);
            const now = new Date();
            const nextMajorMinor = `${now.getFullYear()}.${now.getMonth() + 1}`; // Months are 0-indexed in JavaScript
            const nextPatch = `${prevMajor}.${prevMinor}` === nextMajorMinor ? prevPatch + 1 : 0;

            console.log(`Previous tag: ${prevTag}`);
            console.log(`Next tag: ${nextMajorMinor}.${nextPatch}`);

            return `${nextMajorMinor}.${nextPatch}`;

      - name: Create Tag
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          TAG_NAME: ${{ steps.determine-next-tag.outputs.result }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |-
            const tagName = process.env.TAG_NAME;

            const tag = await github.rest.git.createTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tagName,
              message: tagName,
              object: context.sha,
              type: "commit"
            });

            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tagName}`,
              sha: tag.data.sha
            });
