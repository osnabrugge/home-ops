name: Build Maddy LOGIN Image

on:
  workflow_dispatch:
    inputs:
      maddy_ref:
        description: "Upstream maddy ref (tag/branch/sha)"
        required: true
        default: "v0.9.3"
      image_name:
        description: "GHCR image name under this owner"
        required: true
        default: "maddy-login"
      image_tag:
        description: "Image tag"
        required: true
        default: "0.9.3-login1"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout home-ops
        uses: actions/checkout@v4

      - name: Checkout upstream maddy
        uses: actions/checkout@v4
        with:
          repository: foxcpp/maddy
          ref: ${{ inputs.maddy_ref }}
          path: maddy-src

      - name: Apply LOGIN patch
        run: |
          cd maddy-src
          git apply ../kubernetes/apps/default/smtp-relay/app/maddy-auth-login.patch
          git diff --stat

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./maddy-src
          file: ./maddy-src/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ inputs.image_tag }}
