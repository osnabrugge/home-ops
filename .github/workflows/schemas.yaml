---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Schemas

on:
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * *
  push:
    branches:
      - main
    paths:
      - .github/workflows/schemas.yaml

permissions:
  contents: read

jobs:
  main:
    name: Schemas
    runs-on: home-ops-runner
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Load Secrets
        id: load-secrets
        uses: azure/cli@v2
        with:
        azcliversion: latest
          inlineScript: |
            SECRET=$(az keyvault secret show \
            --vault-name ${{ secrets.KEYVAULT_NAME }} \
            --name github-bot \
            --query value -o tsv
)
            echo "GITHUB_BOT_APP_CLIENT_ID=$(echo "$SECRET" | jq -r '.GITHUB_BOT_APP_CLIENT_ID')" >> $GITHUB_ENV
            echo "GITHUB_BOT_APP_PRIVATE_KEY=$(echo "$SECRET" | jq -r '.GITHUB_BOT_APP_PRIVATE_KEY_B64' | base64 -d)" >> $GITHUB_ENV

      - name: Install crd-schema-publisher
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p ~/.local/bin
          gh release download v2026.427.230454 --repo sholdee/crd-schema-publisher --pattern 'crd-schema-publisher-linux-amd64' --output ~/.local/bin/crd-schema-publisher --clobber
          chmod +x ~/.local/bin/crd-schema-publisher
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run crd-schema-publisher
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.load-secrets.outputs.CLOUDFLARE_SCHEMA_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.load-secrets.outputs.CLOUDFLARE_ACCOUNT_TAG }}
          CF_PAGES_PROJECT: kubernetes-schemas
        run: |-
          mkdir -p "$RUNNER_TEMP/crd-schemas"
          crd-schema-publisher run --output-dir "$RUNNER_TEMP/crd-schemas"
