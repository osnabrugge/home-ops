---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Schemas

on:
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * *
  push:
    branches:
      - main
    paths:
      - .github/workflows/schemas.yaml

permissions:
  contents: read

jobs:
  main:
    name: Schemas
    runs-on: home-ops-runner
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Load Secrets
        id: load-secrets
        run: |
          SECRET=$(az keyvault secret show \
            --vault-name ${{ secrets.KEYVAULT_NAME }} \
            --name github-bot \
            --query value -o tsv)

          echo "GITHUB_BOT_APP_CLIENT_ID=$(echo "$SECRET" | jq -r '.GITHUB_BOT_APP_CLIENT_ID')" >> $GITHUB_OUTPUT
          echo "GITHUB_BOT_APP_PRIVATE_KEY=$(echo "$SECRET" | jq -r '.GITHUB_BOT_APP_PRIVATE_KEY_B64' | base64 -d)" >> $GITHUB_OUTPUT

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ steps.load-secrets.outputs.GITHUB_BOT_APP_CLIENT_ID }}
          private-key: ${{ steps.load-secrets.outputs.GITHUB_BOT_APP_PRIVATE_KEY }}

      - name: Install crd-schema-publisher
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p ~/.local/bin
          gh release download v2026.427.230454 --repo sholdee/crd-schema-publisher --pattern 'crd-schema-publisher-linux-amd64' --output ~/.local/bin/crd-schema-publisher --clobber
          chmod +x ~/.local/bin/crd-schema-publisher
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run crd-schema-publisher
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.load-secrets.outputs.CLOUDFLARE_SCHEMA_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.load-secrets.outputs.CLOUDFLARE_ACCOUNT_TAG }}
          CF_PAGES_PROJECT: kubernetes-schemas
        run: |-
          mkdir -p "$RUNNER_TEMP/crd-schemas"
          crd-schema-publisher run --output-dir "$RUNNER_TEMP/crd-schemas"
