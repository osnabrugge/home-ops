---
name: Build Brocade ICX MCP image
on:
  push:
    branches: ["main"]
    paths:
      - docker/brocade-icx-mcp/**
      - .github/workflows/brocade-mcp-image.yaml
  workflow_dispatch: {}
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: docker/brocade-icx-mcp
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/osnabrugge/brocade-icx-mcp:1.0.0
            ghcr.io/osnabrugge/brocade-icx-mcp:latest
