---
name: Build Brocade ICX MCP image
on:
  push:
    branches: ["main"]
    paths:
      - docker/brocade-icx-mcp/**
      - .github/workflows/brocade-mcp-image.yaml
  workflow_dispatch: {}
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: docker/brocade-icx-mcp
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/osnabrugge/brocade-icx-mcp:1.0.0
            ghcr.io/osnabrugge/brocade-icx-mcp:latest
