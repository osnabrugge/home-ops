---
name: Build Brocade ICX MCP image
on:
  push:
    branches: ["main"]
    paths:
      - docker/brocade-icx-mcp/**
      - .github/workflows/brocade-mcp-image.yaml
  workflow_dispatch: {}
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/brocade-icx-mcp
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/osnabrugge/brocade-icx-mcp:1.0.0
            ghcr.io/osnabrugge/brocade-icx-mcp:latest
